# ============================================
# Pod Disruption Budgets for PayFlow Services
# ============================================
# Purpose: Ensure high availability during voluntary disruptions
# 
# Why We Need This:
# - Prevents all pods from being terminated simultaneously during:
#   * Rolling updates (deployment updates)
#   * Node maintenance (draining nodes)
#   * Cluster upgrades
#   * Manual pod deletions
# - Ensures minimum service availability during disruptions
# - Prevents service downtime during planned maintenance
#
# What Happens Without It:
# - All pods can be terminated at once during updates
# - Service becomes completely unavailable during rolling updates
# - No protection against accidental mass pod deletion
# - Users experience downtime during deployments
# - No guarantee of service availability during node maintenance
#
# How It Works:
# - Defines minimum available pods (minAvailable) or maximum unavailable (maxUnavailable)
# - Kubernetes scheduler respects PDB during disruptions
# - Prevents too many pods from being terminated simultaneously
# - Works with Deployments, StatefulSets, and other controllers
#
# Example Scenario:
# - Transaction Service has 3 replicas
# - PDB requires minAvailable: 2
# - During rolling update, only 1 pod can be terminated at a time
# - Ensures at least 2 pods are always serving traffic

# ============================================
# API Gateway Pod Disruption Budget
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: payflow
spec:
  minAvailable: 1  # At least 1 pod must be available (out of 2 replicas)
  selector:
    matchLabels:
      app: api-gateway
---
# ============================================
# Auth Service Pod Disruption Budget
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: payflow
spec:
  minAvailable: 1  # At least 1 pod must be available (out of 2 replicas)
  selector:
    matchLabels:
      app: auth-service
---
# ============================================
# Wallet Service Pod Disruption Budget
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wallet-service-pdb
  namespace: payflow
spec:
  minAvailable: 1  # At least 1 pod must be available (out of 2 replicas)
  selector:
    matchLabels:
      app: wallet-service
---
# ============================================
# Transaction Service Pod Disruption Budget
# ============================================
# Critical service - requires higher availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transaction-service-pdb
  namespace: payflow
spec:
  minAvailable: 2  # At least 2 pods must be available (out of 3+ replicas)
  # Why 2? Transaction service is critical - handles money transfers
  # Higher minAvailable ensures better availability during updates
  selector:
    matchLabels:
      app: transaction-service
---
# ============================================
# Notification Service Pod Disruption Budget
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service-pdb
  namespace: payflow
spec:
  minAvailable: 1  # At least 1 pod must be available (out of 2 replicas)
  # Lower priority - notifications can be queued if service is temporarily unavailable
  selector:
    matchLabels:
      app: notification-service
---
# ============================================
# Frontend Pod Disruption Budget
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: payflow
spec:
  minAvailable: 1  # At least 1 pod must be available (out of 2 replicas)
  selector:
    matchLabels:
      app: frontend

