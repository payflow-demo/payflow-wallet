 # ============================================
# Monitoring Services Ingress (Prometheus & Grafana)
# ============================================
# Purpose: Routes external traffic to monitoring services
# Use Case: Local development - access Prometheus and Grafana via friendly URLs
# 
# Access:
#   - Prometheus: http://prometheus.payflow.local
#   - Grafana: http://grafana.payflow.local
#
# Setup:
#   1. Add to /etc/hosts (macOS/Linux) or C:\Windows\System32\drivers\etc\hosts (Windows):
#      192.168.64.2 prometheus.payflow.local grafana.payflow.local
#   2. Get ingress IP: kubectl get ingress -n monitoring
#   3. Use ingress IP instead of 192.168.64.2 if different
#
# Note: This is for local development only. Use TLS ingress for production.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    # Enable CORS for Grafana
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    # Increase timeout for Prometheus queries
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx  # Use nginx ingress controller (enabled in MicroK8s)
  rules:
  # Prometheus routing
  - host: prometheus.payflow.local
    http:
      paths:
      - path: /
        pathType: Prefix  # Match all paths starting with /
        backend:
          service:
            name: prometheus
            port:
              number: 9090  # Prometheus service port
  # Grafana routing
  - host: grafana.payflow.local
    http:
      paths:
      - path: /
        pathType: Prefix  # Match all paths starting with /
        backend:
          service:
            name: grafana
            port:
              number: 3000  # Grafana service port

