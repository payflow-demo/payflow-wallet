# ============================================
# PayFlow Local Ingress with Self-Signed TLS
# ============================================
# Purpose: Routes external traffic with HTTPS using self-signed certificates
# Use Case: Local development - test HTTPS flow without real certificates
# Why: Tests HTTPS behavior, but browsers will show security warnings
#
# Prerequisites:
#   1. Create self-signed certificate (see instructions below)
#   2. Create Kubernetes secret with certificate
#
# Access:
#   - Frontend: https://www.payflow.local (browser warning expected)
#   - API: https://api.payflow.local (browser warning expected)
#
# Setup:
#   1. Generate self-signed certificate:
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout tls.key -out tls.crt \
#        -subj "/CN=payflow.local" \
#        -addext "subjectAltName=DNS:www.payflow.local,DNS:api.payflow.local"
#
#   2. Create Kubernetes secret:
#      kubectl create secret tls payflow-local-tls \
#        --cert=tls.crt --key=tls.key -n payflow
#
#   3. Add to /etc/hosts:
#      127.0.0.1 www.payflow.local api.payflow.local
#
# Note: Self-signed certificates cause browser warnings. Accept the warning to proceed.
# For production, use Let's Encrypt ingress instead.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-local-ingress
  namespace: payflow
  annotations:
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting: 100 requests per minute per IP
    nginx.ingress.kubernetes.io/rate-limit: "100"
    # Backend uses HTTP (TLS termination at ingress)
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.payflow.local
    - www.payflow.local
    secretName: payflow-local-tls  # Secret containing self-signed certificate
  rules:
  # API Gateway routing (separate subdomain)
  - host: api.payflow.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80  # Service port (targets container port 3000)
  # Frontend routing (with /api path for backend calls)
  - host: www.payflow.local
    http:
      paths:
      # ============================================
      # CRITICAL: /api path MUST come BEFORE / path
      # ============================================
      # Why: Nginx ingress processes paths in order
      # If / comes first, it catches everything (including /api)
      # More specific paths must be defined before less specific ones
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80  # Routes /api/* to API Gateway
      # Catch-all for React app (static files, routes)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

