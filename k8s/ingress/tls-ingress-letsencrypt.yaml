# ============================================
# PayFlow Ingress with Let's Encrypt TLS
# ============================================
# Purpose: Routes external traffic with HTTPS using Let's Encrypt certificates
# Use Case: Production environments (EKS/AKS/GKE) with real domains
# Why: Real SSL certificates, automatic renewal, no browser warnings
#
# Prerequisites:
#   1. cert-manager must be enabled: microk8s enable cert-manager
#   2. Domain must point to ingress IP/LoadBalancer
#   3. ClusterIssuer must be created first (see below)
#
# Access:
#   - Frontend: https://www.payflow.local (or your domain)
#   - API: https://api.payflow.local (or your domain)
#
# Setup:
#   1. Enable cert-manager: microk8s enable cert-manager
#   2. Create ClusterIssuer (see cluster-issuer.yaml)
#   3. Update email in ClusterIssuer to your email
#   4. Update hosts in this file to your actual domains
#   5. Deploy: kubectl apply -f k8s/ingress/
#
# Note: Let's Encrypt requires:
#   - Valid domain name (not localhost or .local)
#   - Domain must resolve to ingress IP
#   - HTTP-01 challenge must be accessible from internet
#   - Rate limits: 50 certs per domain per week

---
# ============================================
# Let's Encrypt ClusterIssuer
# ============================================
# Purpose: Automatically provisions SSL certificates from Let's Encrypt
# cert-manager handles certificate renewal automatically
#
# Important: Update email to your actual email address
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for certificate expiration notifications
    # UPDATE THIS TO YOUR EMAIL
    email: admin@payflow.local
    # Secret to store ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx  # Use nginx ingress class

---
# ============================================
# PayFlow Ingress with TLS
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-ingress
  namespace: payflow
  annotations:
    # Use cert-manager to automatically provision certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting: 100 requests per minute per IP
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.payflow.local  # UPDATE TO YOUR ACTUAL DOMAIN
    - www.payflow.local  # UPDATE TO YOUR ACTUAL DOMAIN
    secretName: payflow-tls  # cert-manager will create this automatically
  rules:
  # API Gateway routing
  - host: api.payflow.local  # UPDATE TO YOUR ACTUAL DOMAIN
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 3000
  # Frontend routing
  - host: www.payflow.local  # UPDATE TO YOUR ACTUAL DOMAIN
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

