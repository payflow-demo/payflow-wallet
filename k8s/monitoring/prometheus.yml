# #### Prometheus Configuration ####
# #### This file configures Prometheus to scrape metrics from PayFlow services ####

# #### Global Configuration ####
# #### These settings apply to all scrape jobs ####
global:
  scrape_interval: 15s    # #### How often to scrape metrics from each target ####
  evaluation_interval: 15s # #### How often to evaluate alert rules ####

# #### Scrape Configurations ####
# #### Define which services to monitor and how ####
scrape_configs:
  # ============================================
  # PAYFLOW SERVICES (Using FQDN for cross-namespace access)
  # ============================================
  # Prometheus runs in 'monitoring' namespace, services in 'payflow' namespace
  # Must use FQDN: service-name.namespace.svc.cluster.local
  
  # api-gateway K8s Service exposes port 80 (→ container 3000); scrape via port 80
  - job_name: 'api-gateway'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
    - targets: ['api-gateway.payflow.svc.cluster.local:80']
  
  - job_name: 'wallet-service'
    static_configs:
    - targets: ['wallet-service.payflow.svc.cluster.local:3001']
  
  - job_name: 'transaction-service'
    static_configs:
    - targets: ['transaction-service.payflow.svc.cluster.local:3002']
  
  - job_name: 'auth-service'
    static_configs:
    - targets: ['auth-service.payflow.svc.cluster.local:3004']
  
  - job_name: 'notification-service'
    static_configs:
    - targets: ['notification-service.payflow.svc.cluster.local:3003']
  
  # ============================================
  # KUBERNETES INFRASTRUCTURE MONITORING
  # ============================================
  
  # #### Kubernetes API Server ####
  # #### Monitor cluster health and control plane ####
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
    - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
    - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
      action: keep
      regex: default;kubernetes;https
  
  # #### CoreDNS Monitoring (CRITICAL) ####
  # #### DNS resolution for service discovery ####
  # #### Would have caught our CronJob DNS issues! ####
  - job_name: 'kube-dns'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
        - kube-system
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_k8s_app]
      action: keep
      regex: kube-dns
    - source_labels: [__meta_kubernetes_pod_container_port_name]
      action: keep
      regex: metrics
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
  
  # #### Kube State Metrics (CRITICAL for CronJob monitoring) ####
  # #### Provides metrics about Kubernetes objects ####
  # #### Jobs, CronJobs, Pods, ResourceQuotas, etc. ####
  - job_name: 'kube-state-metrics'
    static_configs:
    - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']
    metric_relabel_configs:
    # Keep only PayFlow namespace metrics to reduce cardinality
    - source_labels: [namespace]
      regex: 'payflow|monitoring'
      action: keep
  
  # ============================================
  # DATABASE MONITORING
  # ============================================
  
  # #### PostgreSQL Exporter ####
  # #### Detailed database metrics: connections, queries, locks ####
  - job_name: 'postgres-exporter'
    scrape_interval: 45s  # Exporter can be slow on small nodes; keep > scrape_timeout
    scrape_timeout: 40s
    static_configs:
    - targets: ['postgres-exporter.payflow.svc.cluster.local:9187']
    relabel_configs:
    - target_label: instance
      replacement: 'postgres'
  
  # ============================================
  # MESSAGE QUEUE MONITORING
  # ============================================
  
  # #### RabbitMQ Detailed Metrics ####
  # #### Queue depth, consumers, publish rate, memory ####
  # #### Enable with: rabbitmq-plugins enable rabbitmq_prometheus ####
  # NOTE: RabbitMQ Prometheus plugin must be enabled first
  - job_name: 'rabbitmq'
    scrape_interval: 30s  # Longer interval for RabbitMQ
    scrape_timeout: 25s   # Timeout must be < interval (30s), so 25s max
    static_configs:
    - targets: ['rabbitmq.payflow.svc.cluster.local:15692']
    metric_relabel_configs:
    # Focus on transaction-related queues
    - source_labels: [queue]
      regex: 'transaction.*|notification.*'
      action: keep
  
  # ============================================
  # CACHING LAYER
  # ============================================
  
  # #### Redis Exporter ####
  # #### Port 6379 is RESP protocol (no HTTP); metrics from redis-exporter on 9121 ####
  - job_name: 'redis'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
    - targets: ['redis-exporter.payflow.svc.cluster.local:9121']
  
  # ============================================
  # NODE METRICS (Optional but recommended)
  # ============================================
  
  # #### Node Exporter (Optional - deploy if needed) ####
  # #### CPU, memory, disk, network at node level ####
  # - job_name: 'node-exporter'
  #   kubernetes_sd_configs:
  #   - role: node
  #   relabel_configs:
  #   - source_labels: [__address__]
  #     regex: '(.*):10250'
  #     replacement: '${1}:9100'
  #     target_label: __address__
  #   - source_labels: [__meta_kubernetes_node_name]
  #     target_label: node

# #### Alerting Configuration ####
# #### Configure where to send alerts ####
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']  # #### AlertManager service and port ####

# #### Alert Rules ####
# #### Define alert rules and thresholds ####
rule_files:
  - '/etc/prometheus/alerts.yml'  # #### Path to alert rules file ####

