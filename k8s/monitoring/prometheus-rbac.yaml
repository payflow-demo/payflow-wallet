# ============================================
# Prometheus RBAC for kubernetes_sd_configs (pod discovery)
# ============================================
# Without this, Prometheus starts but pod/endpoint discovery returns no targets.
# ClusterRole + ClusterRoleBinding allow Prometheus to list pods/endpoints in any namespace.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-pod-discovery
  labels:
    app: prometheus
rules:
# Required for kubernetes_sd_configs role: pod (and endpoint discovery)
- apiGroups: [""]
  resources: ["pods", "endpoints", "services"]
  verbs: ["list", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-pod-discovery
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-pod-discovery
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
