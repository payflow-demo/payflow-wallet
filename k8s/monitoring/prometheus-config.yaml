# ============================================
# Prometheus Configuration for PayFlow
# ============================================
# NOTE: monitoring/deploy-monitoring.sh builds the live ConfigMap from
# k8s/monitoring/prometheus.yml (not this file). Keep them aligned if you edit scrape jobs.
# Purpose: Configure Prometheus to scrape metrics from all PayFlow services
# Metrics Scraped: HTTP requests, business metrics, infrastructure health
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    # #### Global Prometheus Configuration ####
    global:
      scrape_interval: 15s          # How often to scrape metrics (15 seconds)
      evaluation_interval: 15s      # How often to evaluate alert rules
      external_labels:               # Labels added to all metrics
        cluster: 'payflow'
        environment: 'production'
    
    # ============================================
    # SCRAPE CONFIGURATIONS
    # ============================================
    # Define which services to scrape metrics from
    
    scrape_configs:
      
      # #### API Gateway Metrics ####
      # Scrapes HTTP metrics, request rates, error rates
      - job_name: 'api-gateway'
        kubernetes_sd_configs:      # Discover pods automatically in Kubernetes
          - role: pod                # Use pods as targets
            namespaces:
              names: ['payflow']    # Only scan payflow namespace
        relabel_configs:
          # Only scrape pods labeled with app=api-gateway
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: api-gateway
            action: keep
          # Use pod IP and port 3000 as target address
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3000
        metrics_path: '/metrics'   # Prometheus endpoint
      
      # #### Auth Service Metrics ####
      # Scrapes authentication metrics, login rates
      - job_name: 'auth-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: auth-service
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3004
        metrics_path: '/metrics'
      
      # #### Wallet Service Metrics ####
      # Scrapes wallet balance metrics, transfer operations
      - job_name: 'wallet-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: wallet-service
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3001
        metrics_path: '/metrics'
      
      # #### Transaction Service Metrics ####
      # Scrapes transaction processing metrics, queue depth
      - job_name: 'transaction-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: transaction-service
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3002
        metrics_path: '/metrics'
      
      # #### Notification Service Metrics ####
      # Scrapes notification sending metrics
      - job_name: 'notification-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: notification-service
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:3003
        metrics_path: '/metrics'
      
      # #### PostgreSQL Database Metrics ####
      # Scrapes postgres-exporter pod (connects to RDS on EKS / in-cluster postgres locally)
      # postgres-exporter exposes metrics on 9187; no app: postgres pod on EKS (RDS is managed)
      - job_name: 'postgres'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: postgres-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9187
        metrics_path: '/metrics'
      
      # #### Redis Cache Metrics ####
      # Scrapes redis-exporter pod (connects to ElastiCache on EKS / in-cluster redis locally)
      # redis-exporter exposes metrics on 9121; no app: redis pod on EKS (ElastiCache is managed)
      - job_name: 'redis'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: redis-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9121
        metrics_path: '/metrics'
      
      # #### RabbitMQ Metrics ####
      # In-cluster RabbitMQ only; on EKS (Amazon MQ) no rabbitmq pod exists — this job returns empty
      # For Amazon MQ metrics, use static_configs or CloudWatch exporter
      - job_name: 'rabbitmq'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['payflow']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: rabbitmq
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:15692
        metrics_path: '/metrics'
    
    # ============================================
    # ALERT MANAGER CONFIGURATION
    # ============================================
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.monitoring.svc.cluster.local:9093']  # AlertManager service in monitoring namespace
    
    # ============================================
    # RULE FILES
    # ============================================
    # Load alert rules from ConfigMap
    rule_files:
      - '/etc/prometheus/rules/*.yml'

