# ============================================
# Alertmanager External Secret (EKS)
# ============================================
# Optional: Apply this when deploying to EKS with Secrets Manager.
# Store the full alertmanager config in AWS Secrets Manager at:
#   payflow/ENV/alertmanager
# with key "alertmanager.yml" containing the YAML config (real SMTP, PagerDuty, Slack).
#
# Without this, the base ConfigMap with placeholders is used - alerts will fail to send.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config-external
  namespace: monitoring
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
  data:
    - secretKey: alertmanager.yml
      remoteRef:
        key: payflow/ENV/alertmanager
        property: alertmanager.yml
