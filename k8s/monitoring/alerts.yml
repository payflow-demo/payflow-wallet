groups:
  - name: payflow-critical-business
    rules:
      # ============================================
      # CRITICAL: Business Impact Alerts
      # ============================================
      
      # CRITICAL: Pending Transactions Stuck (THE BIG ONE)
      - alert: PendingTransactionsStuck
        expr: payflow_pending_transactions_total > 0
        for: 2m
        labels:
          severity: P0
          team: backend
        annotations:
          summary: "{{ $value }} transactions stuck in PENDING status"
          description: "User funds are locked! Immediate investigation required."
          runbook: "https://github.com/payflow/docs/troubleshooting-pending-transactions.md"
          dashboard: "https://grafana.payflow.com/d/payflow-business"
      
      # CRITICAL: Money Stuck
      - alert: MoneyStuckInPendingTransactions
        expr: payflow_pending_transaction_amount_total > 1000
        for: 2m
        labels:
          severity: P0
          team: backend
        annotations:
          summary: "${{ $value }} stuck in pending transactions"
          description: "Real money is locked. Users cannot access funds."
          runbook: "https://github.com/payflow/docs/troubleshooting-pending-transactions.md"
      
      # CRITICAL: Old Pending Transaction
      - alert: OldestPendingTransactionTooOld
        expr: (time() - payflow_transactions_oldest_pending_timestamp) > 120
        for: 1m
        labels:
          severity: P0
          team: backend
        annotations:
          summary: "Oldest pending transaction is {{ $value | humanizeDuration }} old"
          description: "Expected auto-reversal after 1 minute. CronJob might be broken."
          runbook: "https://github.com/payflow/docs/troubleshooting-pending-transactions.md"
      
      # CRITICAL: Transaction Failure Rate
      - alert: TransactionFailureRateHigh
        expr: |
          (
            rate(payflow_transactions_total{status="failed"}[5m]) 
            / 
            rate(payflow_transactions_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "{{ $value | humanizePercentage }} of transactions are failing"
          description: "Normal rate is <1%. Current: {{ $value | humanizePercentage }}"
          runbook: "https://github.com/payflow/docs/transaction-failures.md"
      
      # CRITICAL: Zero Transactions
      - alert: NoTransactionsProcessed
        expr: rate(payflow_transactions_total[5m]) == 0
        for: 10m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "No transactions in last 10 minutes"
          description: "System appears dead or users can't transact"

  - name: payflow-cronjob-health
    rules:
      # ============================================
      # CronJob Monitoring (Would have caught our issue!)
      # ============================================
      
      # CRITICAL: CronJob Not Executing
      - alert: TransactionTimeoutCronJobNotRunning
        expr: |
          (time() - max(kube_job_status_completion_time{job_name=~"transaction-timeout-handler.*"})) > 180
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "🚨 Transaction timeout CronJob hasn't run in 3+ minutes"
          description: "Expected every minute. Pending transactions won't be reversed!"
          runbook: "https://github.com/payflow/docs/troubleshooting-pending-transactions.md#cronjob-not-running"
      
      # CRITICAL: CronJob Failures
      - alert: CronJobFailureRate
        expr: rate(kube_job_status_failed{job_name=~"transaction-timeout-handler.*"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "CronJob {{ $labels.job_name }} is failing"
          description: "{{ $value }} failures in last 5 minutes. Check pod logs."
      
      # WARNING: Job Pod Running Too Long
      - alert: JobPodStuckRunning
        expr: |
          (time() - kube_pod_start_time{pod=~"transaction-timeout-handler.*"}) > 300
        for: 1m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Job pod {{ $labels.pod }} running for >5 minutes"
          description: "Expected completion in 10-15 seconds. Pod might be stuck."
      
      # CRITICAL: CronJob Suspended
      - alert: CronJobSuspended
        expr: kube_cronjob_spec_suspend{cronjob="transaction-timeout-handler"} == 1
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "🚨 Transaction timeout CronJob is SUSPENDED"
          description: "Manual suspension or incident response. Pending transactions won't be reversed!"

  - name: payflow-service-health
    rules:
      # Service Health Alerts
      - alert: ServiceDown
        expr: up{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute"

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service",code=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate for {{ $labels.job }}"
          description: "Error rate for {{ $labels.job }} is {{ $value }} errors per second"

      # High Response Time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service"}[5m])) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High response time for {{ $labels.job }}"
          description: "95th percentile response time for {{ $labels.job }} is {{ $value }} seconds"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service"} > 500 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage for {{ $labels.job }}"
          description: "Memory usage for {{ $labels.job }} is {{ $value | humanize1024 }}B"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage for {{ $labels.job }}"
          description: "CPU usage for {{ $labels.job }} is {{ $value }}%"

      # Database Connection Issues
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL database has been down for more than 1 minute"

      # Redis Connection Issues
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"

      # RabbitMQ Connection Issues
      - alert: RabbitMQDown
        expr: up{job="rabbitmq"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ is down"
          description: "RabbitMQ has been down for more than 1 minute"

      # Transaction Failure Rate
      - alert: HighTransactionFailureRate
        expr: rate(payflow_transactions_total{status="failed"}[5m]) / rate(payflow_transactions_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High transaction failure rate"
          description: "Transaction failure rate is {{ $value | humanizePercentage }}"

      # Circuit Breaker Open
      - alert: CircuitBreakerOpen
        expr: payflow_circuit_breaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker is open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} has been open for more than 1 minute"

      # Low Success Rate
      - alert: LowSuccessRate
        expr: rate(http_requests_total{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service",code!~"5.."}[5m]) / rate(http_requests_total{job=~"api-gateway|auth-service|wallet-service|transaction-service|notification-service"}[5m]) < 0.95
        for: 3m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Low success rate for {{ $labels.job }}"
          description: "Success rate for {{ $labels.job }} is {{ $value | humanizePercentage }}"

  - name: payflow-infrastructure
    rules:
      # ============================================
      # Infrastructure Health
      # ============================================
      
      # CRITICAL: CoreDNS Down
      - alert: CoreDNSDown
        expr: up{job="kube-dns"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "🚨 CoreDNS is DOWN"
          description: "DNS resolution broken. All service discovery will fail. CronJobs will fail with DNS errors."
          runbook: "https://github.com/payflow/docs/troubleshooting-pending-transactions.md#coredns-issues"
      
      # CRITICAL: CoreDNS Errors
      - alert: CoreDNSErrorsHigh
        expr: rate(coredns_dns_responses_total{rcode="SERVFAIL"}[5m]) > 10
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "CoreDNS failing DNS lookups"
          description: "{{ $value }} SERVFAIL responses/sec. Check CoreDNS logs for API connection issues."
      
      # CRITICAL: Pod Quota Near Limit
      - alert: PodQuotaNearLimit
        expr: |
          (
            kube_resourcequota{namespace="payflow", type="used", resource="pods"} 
            / 
            kube_resourcequota{namespace="payflow", type="hard", resource="pods"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod quota at {{ $value | humanizePercentage }}"
          description: "Will hit limit soon. CronJobs will fail with 'exceeded quota' errors."
      
      # CRITICAL: CPU Quota Near Limit
      - alert: CPUQuotaNearLimit
        expr: |
          (
            kube_resourcequota{namespace="payflow", type="used", resource="requests.cpu"} 
            / 
            kube_resourcequota{namespace="payflow", type="hard", resource="requests.cpu"}
          ) > 0.90
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "CPU quota at {{ $value | humanizePercentage }}"
          description: "Cannot deploy new pods. Need to increase quota or reduce requests."
      
      # CRITICAL: Memory Quota Near Limit
      - alert: MemoryQuotaNearLimit
        expr: |
          (
            kube_resourcequota{namespace="payflow", type="used", resource="requests.memory"} 
            / 
            kube_resourcequota{namespace="payflow", type="hard", resource="requests.memory"}
          ) > 0.90
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Memory quota at {{ $value | humanizePercentage }}"
          description: "Cannot deploy new pods. Need to increase quota or reduce requests."

  - name: payflow-rabbitmq
    rules:
      # ============================================
      # RabbitMQ Monitoring
      # ============================================
      
      # CRITICAL: RabbitMQ Queue Backlog
      - alert: RabbitMQQueueBacklog
        expr: rabbitmq_queue_messages_ready{queue=~"transaction.*"} > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} has {{ $value }} messages"
          description: "Queue backlog building. Worker might be down or slow."
      
      # CRITICAL: RabbitMQ No Consumers
      - alert: RabbitMQNoConsumers
        expr: rabbitmq_queue_consumers{queue=~"transaction.*"} == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} has NO consumers"
          description: "Worker is down. Messages will pile up. Transactions won't process."
      
      # WARNING: RabbitMQ Consumer Lag
      - alert: RabbitMQConsumerLag
        expr: rabbitmq_queue_consumer_utilisation < 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RabbitMQ consumers underutilized"
          description: "Only {{ $value | humanizePercentage }} utilization. Consider scaling workers."
      
      # CRITICAL: RabbitMQ Publisher Blocked
      - alert: RabbitMQPublisherBlocked
        expr: rabbitmq_connection_channels_blocked > 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "RabbitMQ publisher blocked"
          description: "Memory alarm or disk space low. Transactions will FAIL to publish."
      
      # CRITICAL: RabbitMQ Memory High
      - alert: RabbitMQMemoryHigh
        expr: |
          (
            rabbitmq_node_mem_used 
            / 
            rabbitmq_node_mem_limit
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RabbitMQ memory at {{ $value | humanizePercentage }}"
          description: "Will trigger flow control and block publishers soon."

  - name: payflow-database
    rules:
      # ============================================
      # Database Monitoring
      # ============================================
      
      # CRITICAL: Database Connection Pool Exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: payflow_db_connection_pool_size{state="active"} / payflow_db_connection_pool_size{state="total"} > 0.9
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Database connection pool at {{ $value | humanizePercentage }}"
          description: "New requests will wait or timeout. Scale up connection pool."
      
      # WARNING: Slow Database Queries
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95, 
            rate(payflow_database_query_duration_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "p95 database query latency is {{ $value }}s"
          description: "Queries taking longer than expected. Check for missing indexes or lock contention."
      
      # CRITICAL: Database Query Errors
      - alert: DatabaseQueryErrorsHigh
        expr: rate(payflow_db_query_errors_total[5m]) > 1
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "{{ $value }} database errors per second"
          description: "Check for connection issues, deadlocks, or syntax errors."
      
      # WARNING: Database Connections High
      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "PostgreSQL has {{ $value }} active connections"
          description: "Close to max connections (100). Risk of connection exhaustion."
      
      # CRITICAL: Database Locks
      - alert: PostgreSQLDeadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "{{ $value }} deadlocks per second. Check transaction isolation and query patterns."

  - name: payflow-slo
    rules:
      # ============================================
      # SLI/SLO Tracking
      # ============================================
      
      # SLO: 99.9% Availability (43 minutes downtime/month)
      - alert: SLOErrorBudgetBurning
        expr: |
          (1 - (
            sum(rate(http_requests_total{code!~"5.."}[30m])) 
            / 
            sum(rate(http_requests_total[30m]))
          )) > 0.001
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Burning error budget too fast"
          description: "At this rate, will exhaust 99.9% SLO budget. Current error rate: {{ $value | humanizePercentage }}"
      
      # SLO: p95 Latency < 500ms
      - alert: LatencySLOViolation
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket{job="api-gateway"}[5m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "p95 latency {{ $value }}s exceeds 500ms SLO"
          description: "Performance degraded beyond acceptable limits. Users experiencing slow responses."
      
      # SLO: Transaction Success Rate > 99%
      - alert: TransactionSLOViolation
        expr: |
          (
            rate(payflow_transactions_total{status="COMPLETED"}[5m]) 
            / 
            rate(payflow_transactions_total[5m])
          ) < 0.99
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Transaction success rate {{ $value | humanizePercentage }} below 99% SLO"
          description: "Too many transaction failures. Investigate root cause."