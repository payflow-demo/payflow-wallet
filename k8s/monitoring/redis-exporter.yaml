# ============================================
# Redis Exporter
# ============================================
# Purpose: Export Redis metrics to Prometheus
# Local: redis-exporter-secret has REDIS_ADDR for in-cluster redis. EKS: ESO overwrites with ElastiCache endpoint:port.
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-exporter-secret
  namespace: payflow
  labels:
    app: redis-exporter
type: Opaque
stringData:
  REDIS_ADDR: "redis.payflow.svc.cluster.local:6379"  # Local; EKS: ESO overwrites with ElastiCache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: payflow
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.55.0
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 9121
              name: metrics
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: redis-exporter-secret
                  key: REDIS_ADDR
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9121
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: payflow
  labels:
    app: redis-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9121
      targetPort: 9121
      protocol: TCP
      name: metrics
  selector:
    app: redis-exporter
