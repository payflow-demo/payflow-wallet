# ============================================
# Alertmanager Deployment for PayFlow
# ============================================
# Purpose: Receive alerts from Prometheus and route to PagerDuty, Slack, email
# Without this, all alerts fire silently into the void.

# ============================================
# Alertmanager Config (Secret for credential support)
# ============================================
# For production: Apply alertmanager-external-secret.yaml to sync from
# AWS Secrets Manager (payflow/ENV/alertmanager) with real credentials.
# Placeholders below (YOUR_PAGERDUTY_*, YOUR/SLACK/WEBHOOK, smtp_*) will cause
# notifications to fail until replaced or ESO syncs real config from Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@payflow.com'
      smtp_auth_username: 'alerts@payflow.com'
      # smtp_auth_password: set via Secret (alertmanager-credentials) or External Secrets
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'severity', 'team']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-alerts'
      routes:
        - match:
            severity: P0
          receiver: 'pagerduty-critical'
          group_wait: 0s
          repeat_interval: 2m
          continue: true
        - match:
            severity: critical
          receiver: 'pagerduty-high'
          group_wait: 10s
          repeat_interval: 5m
          continue: true
        - match:
            severity: warning
          receiver: 'slack-alerts'
          group_wait: 1m
          repeat_interval: 1h
        - match:
            env: development
          receiver: 'webhook-dev'
          group_wait: 10s
          repeat_interval: 1h

    receivers:
      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
            description: '{{ .CommonAnnotations.summary }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              description: '{{ .CommonAnnotations.description }}'
              runbook: '{{ .CommonAnnotations.runbook }}'
            severity: 'critical'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#incidents'
            title: '🚨 CRITICAL: {{ .CommonAnnotations.summary }}'
            text: |
              *Alert:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Runbook:* {{ .CommonAnnotations.runbook }}
              *Dashboard:* {{ .CommonAnnotations.dashboard }}
              *Affected Services:* {{ range .Alerts }}{{ .Labels.job }} {{ end }}
            color: 'danger'
            send_resolved: true

      - name: 'pagerduty-high'
        pagerduty_configs:
          - service_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
            description: '{{ .CommonAnnotations.summary }}'
            severity: 'error'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#incidents'
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
            color: 'danger'
            send_resolved: true

      - name: 'slack-alerts'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts'
            title: '{{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Service:* {{ .Labels.job }}
              {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
            send_resolved: true

      - name: 'email-backup'
        email_configs:
          - to: 'oncall@payflow.com'
            from: 'alerts@payflow.com'
            # v0.27+: top-level `subject` removed — use headers (amtool: field subject not found in type config.plain)
            headers:
              Subject: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
            html: |
              <h2>{{ .CommonAnnotations.summary }}</h2>
              <p>{{ .CommonAnnotations.description }}</p>
              <ul>
              {{ range .Alerts }}
                <li>{{ .Labels.job }}: {{ .Annotations.summary }}</li>
              {{ end }}
              </ul>

      - name: 'webhook-dev'
        webhook_configs:
          - url: 'http://localhost:5001/alerts'
            send_resolved: true
            http_config:
              bearer_token: 'dev-webhook-token'

    inhibit_rules:
      - source_match:
          severity: 'critical'
          alertname: 'ServiceDown'
        target_match:
          severity: 'warning'
        equal: ['job']
      - source_match:
          alertname: 'RabbitMQDown'
        target_match:
          alertname: 'TransactionFailureRateHigh'
        equal: ['namespace']
      - source_match:
          alertname: 'CoreDNSDown'
        target_match_re:
          alertname: '.*CronJob.*'
        equal: ['namespace']
      - source_match:
          alertname: 'CronJobSuspended'
        target_match:
          alertname: 'PendingTransactionsStuck'
        equal: ['namespace']
---
# ============================================
# Alertmanager Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      protocol: TCP
      name: http
  selector:
    app: alertmanager
---
# ============================================
# Alertmanager Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          securityContext:
            allowPrivilegeEscalation: false
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          secret:
            secretName: alertmanager-config
        - name: storage
          emptyDir: {}
