# ============================================
# Prometheus Deployment for PayFlow
# ============================================
# Purpose: Deploy Prometheus to collect and store metrics from all PayFlow services
# Prometheus scrapes metrics from services and stores them for querying and alerting

# ============================================
# Prometheus Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: ClusterIP  # Internal service (will expose via ingress later)
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: prometheus
---
# ============================================
# Prometheus PersistentVolumeClaim
# ============================================
# Purpose: Persistent storage for Prometheus metrics data
# Metrics are stored here and retained for 30 days
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce  # Only one pod can mount this volume
  resources:
    requests:
      storage: 50Gi  # 50GB for 30 days of metrics retention
  storageClassName: microk8s-hostpath  # Use MicroK8s default storage class
  # Note: For production (AKS/EKS), use: storageClassName: managed-premium
---
# ============================================
# Prometheus Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1  # Single instance (Prometheus is stateful)
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus  # Required for kubernetes_sd_configs pod discovery (see prometheus-rbac.yaml)
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.0
          ports:
            - containerPort: 9090
              name: http
              protocol: TCP
          args:
            # Configuration file location
            - '--config.file=/etc/prometheus/prometheus.yml'
            # Storage path for metrics
            - '--storage.tsdb.path=/prometheus'
            # Web UI console libraries
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            # Web UI console templates
            - '--web.console.templates=/usr/share/prometheus/consoles'
            # Retain metrics for 30 days
            - '--storage.tsdb.retention.time=30d'
            # Enable admin API (for configuration reload)
            - '--web.enable-lifecycle'
          resources:
            requests:
              memory: "512Mi"   # Minimum memory needed
              cpu: "250m"       # Minimum CPU (250 millicores)
            limits:
              memory: "1Gi"     # Maximum memory allowed
              cpu: "500m"       # Maximum CPU
          volumeMounts:
            # Mount Prometheus configuration
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            # Mount alert rules
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            # Mount persistent storage for metrics
            - name: storage
              mountPath: /prometheus
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        # Prometheus configuration from ConfigMap
        - name: config
          configMap:
            name: prometheus-config
        # Alert rules from ConfigMap
        - name: rules
          configMap:
            name: prometheus-rules
        # Persistent storage for metrics
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-storage
  strategy:
    type: Recreate  # Don't roll updates, just recreate (stateful service)

