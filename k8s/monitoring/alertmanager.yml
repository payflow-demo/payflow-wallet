# ============================================
# AlertManager Configuration
# ============================================
# Purpose: Route alerts to appropriate channels
# Critical (P0) → PagerDuty + Slack #incidents
# Warning → Slack #alerts
# Development → Webhook for testing

global:
  resolve_timeout: 5m
  # SMTP for email notifications
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@payflow.com'
  smtp_auth_username: 'alerts@payflow.com'
  smtp_auth_password: 'REPLACE_WITH_APP_PASSWORD'  # Use app-specific password
  smtp_require_tls: true

# ============================================
# Routing Rules
# ============================================
route:
  # Group alerts by name and severity
  group_by: ['alertname', 'severity', 'team']
  
  # Wait before sending first notification (allows grouping)
  group_wait: 30s
  
  # Wait before sending update about new alerts in group
  group_interval: 5m
  
  # Wait before resending alert
  repeat_interval: 4h
  
  # Default receiver
  receiver: 'slack-alerts'
  
  # ============================================
  # Route Overrides by Severity
  # ============================================
  routes:
    # P0: Critical Business Impact - PAGE IMMEDIATELY
    - match:
        severity: P0
      receiver: 'pagerduty-critical'
      group_wait: 0s  # Send immediately, no grouping delay
      repeat_interval: 2m  # Repeat every 2 minutes until resolved
      continue: true  # Also send to Slack
    
    # Critical: Infrastructure/Service Down
    - match:
        severity: critical
      receiver: 'pagerduty-high'
      group_wait: 10s
      repeat_interval: 5m
      continue: true
    
    # Warning: Needs attention but not urgent
    - match:
        severity: warning
      receiver: 'slack-alerts'
      group_wait: 1m
      repeat_interval: 1h
    
    # Development/Testing
    - match:
        env: development
      receiver: 'webhook-dev'
      group_wait: 10s
      repeat_interval: 1h

# ============================================
# Receivers (Notification Channels)
# ============================================
receivers:
  # ============================================
  # PagerDuty: Critical Alerts (Wake up on-call)
  # ============================================
  - name: 'pagerduty-critical'
    pagerduty_configs:
    - service_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'  # Replace with actual key
      description: '{{ .CommonAnnotations.summary }}'
      details:
        firing: '{{ .Alerts.Firing | len }}'
        resolved: '{{ .Alerts.Resolved | len }}'
        description: '{{ .CommonAnnotations.description }}'
        runbook: '{{ .CommonAnnotations.runbook }}'
      severity: 'critical'
    
    # Also notify Slack #incidents channel
    slack_configs:
    - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'  # Replace
      channel: '#incidents'
      title: '🚨 CRITICAL: {{ .CommonAnnotations.summary }}'
      text: |
        *Alert:* {{ .CommonAnnotations.summary }}
        *Description:* {{ .CommonAnnotations.description }}
        *Runbook:* {{ .CommonAnnotations.runbook }}
        *Dashboard:* {{ .CommonAnnotations.dashboard }}
        *Affected Services:* {{ range .Alerts }}{{ .Labels.job }} {{ end }}
      color: 'danger'
      send_resolved: true
  
  # ============================================
  # PagerDuty: High Priority
  # ============================================
  - name: 'pagerduty-high'
    pagerduty_configs:
    - service_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
      description: '{{ .CommonAnnotations.summary }}'
      severity: 'error'
    
    slack_configs:
    - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      channel: '#incidents'
      title: '{{ .CommonAnnotations.summary }}'
      text: '{{ .CommonAnnotations.description }}'
      color: 'danger'
      send_resolved: true
  
  # ============================================
  # Slack: Regular Alerts
  # ============================================
  - name: 'slack-alerts'
    slack_configs:
    - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      channel: '#alerts'
      title: '{{ .CommonAnnotations.summary }}'
      text: |
        {{ range .Alerts }}
        *Alert:* {{ .Annotations.summary }}
        *Description:* {{ .Annotations.description }}
        *Severity:* {{ .Labels.severity }}
        *Service:* {{ .Labels.job }}
        {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
        {{ end }}
      color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
      send_resolved: true
  
  # ============================================
  # Email: Backup Notifications
  # ============================================
  - name: 'email-backup'
    email_configs:
    - to: 'oncall@payflow.com'
      from: 'alerts@payflow.com'
      subject: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
      html: |
        <h2>{{ .CommonAnnotations.summary }}</h2>
        <p>{{ .CommonAnnotations.description }}</p>
        <ul>
        {{ range .Alerts }}
          <li>{{ .Labels.job }}: {{ .Annotations.summary }}</li>
        {{ end }}
        </ul>
  
  # ============================================
  # Webhook: Development/Testing
  # ============================================
  - name: 'webhook-dev'
    webhook_configs:
    - url: 'http://localhost:5001/alerts'
      send_resolved: true
      http_config:
        bearer_token: 'dev-webhook-token'

# ============================================
# Inhibition Rules
# ============================================
# Prevent redundant alerts
inhibit_rules:
  # Don't alert on high error rate if service is down
  - source_match:
      severity: 'critical'
      alertname: 'ServiceDown'
    target_match:
      severity: 'warning'
    equal: ['job']
  
  # Don't alert on transaction failures if RabbitMQ is down
  - source_match:
      alertname: 'RabbitMQDown'
    target_match:
      alertname: 'TransactionFailureRateHigh'
    equal: ['namespace']
  
  # Don't alert on CronJob failures if CoreDNS is down
  - source_match:
      alertname: 'CoreDNSDown'
    target_match_re:
      alertname: '.*CronJob.*'
    equal: ['namespace']
  
  # Don't alert on pending transactions if CronJob is known to be suspended
  - source_match:
      alertname: 'CronJobSuspended'
    target_match:
      alertname: 'PendingTransactionsStuck'
    equal: ['namespace']
