# ============================================
# PostgreSQL Exporter
# ============================================
# Purpose: Export PostgreSQL metrics to Prometheus
# Provides: Connection count, query duration, lock stats, etc.

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: payflow
data:
  queries.yaml: |
    # Custom queries for PayFlow
    pg_transactions_by_status:
      query: "SELECT status, COUNT(*) as count FROM transactions GROUP BY status"
      metrics:
        - status:
            usage: "LABEL"
            description: "Transaction status"
        - count:
            usage: "GAUGE"
            description: "Number of transactions by status"
    
    pg_oldest_pending_transaction:
      query: "SELECT EXTRACT(EPOCH FROM (NOW() - MIN(created_at))) as age_seconds FROM transactions WHERE status = 'PENDING'"
      metrics:
        - age_seconds:
            usage: "GAUGE"
            description: "Age of oldest pending transaction in seconds"
    
    pg_pending_transaction_amount:
      query: "SELECT COALESCE(SUM(amount), 0) as total_amount FROM transactions WHERE status = 'PENDING'"
      metrics:
        - total_amount:
            usage: "GAUGE"
            description: "Total amount stuck in pending transactions"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: payflow
type: Opaque
stringData:
  # Use FQDN for reliable DNS resolution (same issue as CronJob had)
  DATA_SOURCE_NAME: "postgresql://payflow:payflowpass@postgres.payflow.svc.cluster.local:5432/payflow?sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: payflow
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - containerPort: 9187
          name: metrics
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-exporter-secret
              key: DATA_SOURCE_NAME
        - name: PG_EXPORTER_EXTEND_QUERY_PATH
          value: "/etc/postgres-exporter/queries.yaml"
        volumeMounts:
        - name: queries
          mountPath: /etc/postgres-exporter
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: queries
        configMap:
          name: postgres-exporter-queries
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: payflow
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  ports:
  - port: 9187
    targetPort: 9187
    protocol: TCP
    name: metrics
  selector:
    app: postgres-exporter

