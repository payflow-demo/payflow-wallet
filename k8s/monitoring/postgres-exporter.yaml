# ============================================
# PostgreSQL Exporter
# ============================================
# Purpose: Export PostgreSQL metrics to Prometheus
# Provides: Connection count, query duration, lock stats, etc.

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: payflow
data:
  queries.yaml: |
    # Custom queries for PayFlow
    pg_transactions_by_status:
      query: "SELECT status, COUNT(*) as count FROM transactions GROUP BY status"
      metrics:
        - status:
            usage: "LABEL"
            description: "Transaction status"
        - count:
            usage: "GAUGE"
            description: "Number of transactions by status"
    
    # Must always return exactly one row or the exporter emits no metric (Grafana shows "No data").
    pg_oldest_pending_transaction:
      query: "SELECT COALESCE(EXTRACT(EPOCH FROM (NOW() - (SELECT MIN(created_at) FROM transactions WHERE status = 'PENDING'))), 0)::float AS age_seconds"
      metrics:
        - age_seconds:
            usage: "GAUGE"
            description: "Age of oldest pending transaction in seconds (0 if none)"
    
    pg_pending_transaction_amount:
      query: "SELECT COALESCE(SUM(amount), 0) as total_amount FROM transactions WHERE status = 'PENDING'"
      metrics:
        - total_amount:
            usage: "GAUGE"
            description: "Total amount stuck in pending transactions"

    pg_users_total:
      query: "SELECT COUNT(*)::float AS n FROM users"
      metrics:
        - n:
            usage: "GAUGE"
            description: "Registered users (signups) in database"

    # Total row count (empty table still returns one row — unlike GROUP BY status).
    pg_transactions_rowcount:
      query: "SELECT COUNT(*)::float AS n FROM transactions"
      metrics:
        - n:
            usage: "GAUGE"
            description: "Total transactions in database"
---
# DSN: use db-secrets (same as app services) so local payflow123 / EKS ESO stay in sync.
# A mismatched password here caused scrapes to hang until Prometheus hit scrape_timeout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: payflow
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - containerPort: 9187
          name: metrics
        env:
        - name: DATA_SOURCE_URI
          value: "postgres.payflow.svc.cluster.local:5432/payflow?sslmode=disable"
        - name: DATA_SOURCE_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_USER
        - name: DATA_SOURCE_PASS
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_PASSWORD
        - name: PG_EXPORTER_EXTEND_QUERY_PATH
          value: "/etc/postgres-exporter/queries.yaml"
        # Default collectors run hundreds of queries per scrape — often exceed Prometheus
        # scrape_timeout (25s) on small clusters; custom queries alone are enough for PayFlow dashboards.
        - name: PG_EXPORTER_DISABLE_DEFAULT_METRICS
          value: "true"
        - name: PG_EXPORTER_DISABLE_SETTINGS_METRICS
          value: "true"
        volumeMounts:
        - name: queries
          mountPath: /etc/postgres-exporter
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: queries
        configMap:
          name: postgres-exporter-queries
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: payflow
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  ports:
  - port: 9187
    targetPort: 9187
    protocol: TCP
    name: metrics
  selector:
    app: postgres-exporter

