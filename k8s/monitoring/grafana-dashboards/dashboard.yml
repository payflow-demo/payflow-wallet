apiVersion: 1

providers:
  - name: 'PayFlow Dashboards'
    orgId: 1
    folder: 'PayFlow'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    # JSON dashboards are mounted separately (see grafana-deployment + deploy-monitoring.sh).
    options:
      path: /etc/grafana/dashboards
