# ============================================
# Loki Deployment for PayFlow
# ============================================
# Purpose: Centralized log aggregation system
# Why: Collects logs from all services for querying and analysis
# Storage: Uses PersistentVolumeClaim for log retention
#
# What Loki Does:
# - Collects logs from all PayFlow services
# - Stores logs in time-series format (like Prometheus for metrics)
# - Allows querying logs with LogQL (similar to PromQL)
# - Integrates with Grafana for visualization
#
# Why We Need Loki:
# - Prometheus = Metrics (numbers: CPU, request rate, errors)
# - Loki = Logs (text: error messages, stack traces, debug info)
# - Both needed: Metrics tell you WHAT, logs tell you WHY

apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yml: |
    # Authentication disabled (internal service, not exposed externally)
    auth_enabled: false
    
    # Server configuration
    server:
      http_listen_port: 3100  # HTTP API port (for queries)
      grpc_listen_port: 9096   # gRPC port (for internal communication)
    
    # Common configuration (shared by all components)
    common:
      path_prefix: /loki       # Base path for Loki data
      storage:
        filesystem:
          chunks_directory: /loki/chunks    # Where log chunks are stored
          rules_directory: /loki/rules       # Where alert rules are stored
      replication_factor: 1  # Single instance (no replication needed)
      ring:
        instance_addr: 127.0.0.1  # Local address
        kvstore:
          store: inmemory  # In-memory key-value store (for single instance)
    
    # Schema configuration (how logs are organized)
    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper  # Storage backend (BoltDB for index, filesystem for chunks)
          object_store: filesystem
          schema: v11
          index:
            prefix: index_      # Prefix for index files
            period: 24h         # Create new index every 24 hours
    
    # Storage configuration
    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active  # Active index location
        cache_location: /loki/boltdb-shipper-cache          # Cache location
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks  # Where log chunks are stored
    
    # Limits configuration (prevent resource exhaustion)
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h  # Reject logs older than 7 days
      retention_period: 168h            # Keep logs for 7 days
      # Why 7 days: Balance between storage cost and usefulness
      # Most issues happen in last 24-48 hours
      # 7 days gives enough history for analysis
    
    # Chunk store configuration
    chunk_store_config:
      max_look_back_period: 168h  # Maximum time to look back (7 days)
    
    # Table manager (handles log retention)
    table_manager:
      retention_deletes_enabled: true
      retention_period: 168h  # Delete logs older than 7 days
---
# ============================================
# Loki Service
# ============================================
# Purpose: Expose Loki internally for other services to send logs
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  type: ClusterIP  # Internal service (not exposed externally)
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app: loki
---
# ============================================
# Loki StatefulSet
# ============================================
# Purpose: Run Loki with persistent storage
# Why StatefulSet (not Deployment):
# - StatefulSets provide stable network identity
# - Better for stateful applications (Loki stores data)
# - Ordered pod management (useful for scaling later)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  serviceName: loki  # Service name for stable network identity
  replicas: 1        # Single instance (can scale later if needed)
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.0
          ports:
            - containerPort: 3100
              name: http
              protocol: TCP
            - containerPort: 9096
              name: grpc
              protocol: TCP
          args:
            - -config.file=/etc/loki/loki.yml  # Configuration file location
          resources:
            requests:
              memory: "512Mi"   # Minimum memory needed
              cpu: "250m"       # Minimum CPU (250 millicores)
            limits:
              memory: "2Gi"     # Maximum memory allowed
              cpu: "1000m"      # Maximum CPU (1 core)
          volumeMounts:
            # Mount configuration
            - mountPath: /etc/loki
              name: config
              readOnly: true
            # Mount persistent storage for logs
            - mountPath: /loki
              name: storage
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        # Configuration from ConfigMap
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    # Persistent storage template (creates PVC automatically)
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce  # Only one pod can mount this volume
        resources:
          requests:
            storage: 100Gi  # 100GB for log storage (7 days retention)
        storageClassName: microk8s-hostpath  # Use MicroK8s default storage class
        # Note: For production (AKS), use: storageClassName: managed-premium
        # Note: For production (EKS), use: storageClassName: gp3

