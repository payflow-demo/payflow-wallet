apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  namespace: external-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: <REGION>
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secrets-external
  namespace: payflow
spec:
  refreshInterval: 5m  # Rotated credentials propagate within 5 min (default 1h)
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-secrets
    # Owner so ESO creates the Secret when missing (Merge does not create; we don't ship a placeholder in EKS)
    creationPolicy: Owner
  data:
  - secretKey: DB_USER
    remoteRef:
      key: payflow/ENV/rds
      property: username
  - secretKey: DB_PASSWORD
    remoteRef:
      key: payflow/ENV/rds
      property: password
  - secretKey: DB_HOST
    remoteRef:
      key: payflow/ENV/rds
      property: host
  - secretKey: DB_PORT
    remoteRef:
      key: payflow/ENV/rds
      property: port
  - secretKey: JWT_SECRET
    remoteRef:
      key: payflow/ENV/app/secrets
      property: jwt_secret
  - secretKey: RABBITMQ_USER
    remoteRef:
      key: payflow/ENV/rabbitmq
      property: username
  - secretKey: RABBITMQ_PASSWORD
    remoteRef:
      key: payflow/ENV/rabbitmq
      property: password
  - secretKey: RABBITMQ_URL
    remoteRef:
      key: payflow/ENV/rabbitmq
      property: url
  - secretKey: REDIS_URL
    remoteRef:
      key: payflow/ENV/redis
      property: url
---
# Postgres Exporter: DSN from RDS (for monitoring stack when used on EKS)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-exporter-secret-external
  namespace: payflow
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-exporter-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATA_SOURCE_NAME: 'postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/payflow?sslmode=require'
  data:
  - secretKey: host
    remoteRef:
      key: payflow/ENV/rds
      property: host
  - secretKey: port
    remoteRef:
      key: payflow/ENV/rds
      property: port
  - secretKey: username
    remoteRef:
      key: payflow/ENV/rds
      property: username
  - secretKey: password
    remoteRef:
      key: payflow/ENV/rds
      property: password
---
# Redis Exporter: REDIS_ADDR from ElastiCache (for monitoring stack when used on EKS)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-exporter-secret-external
  namespace: payflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redis-exporter-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        REDIS_ADDR: '{{ .endpoint }}:{{ .port }}'
  data:
  - secretKey: endpoint
    remoteRef:
      key: payflow/ENV/redis
      property: endpoint
  - secretKey: port
    remoteRef:
      key: payflow/ENV/redis
      property: port
