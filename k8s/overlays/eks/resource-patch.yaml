# Reduce CPU requests and replicas to fit within small EKS node capacity.
# Use when seeing "Insufficient cpu" during pod scheduling.
# Quota: requests.cpu=4; scaling to 1 replica per service keeps total under quota.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: api-gateway
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
---
