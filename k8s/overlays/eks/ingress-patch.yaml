# EKS Ingress - AWS ALB (split so each target group has correct healthcheck path)
# REQUIRED before apply: replace placeholders (or ALB will not become ready):
#   WAF_ARN=$(terraform -chdir=terraform/aws/spoke-vpc-eks output -raw waf_web_acl_arn)
#   ACM_ARN=$(terraform -chdir=terraform/aws/spoke-vpc-eks output -raw acm_certificate_arn 2>/dev/null || true)
#   sed -i.bak "s|<WAF_ARN>|${WAF_ARN}|g; s|<ACM_CERT_ARN>|${ACM_ARN}|g" this file
# If ACM_ARN is empty (no cert in Terraform), comment out certificate-arn, ssl-redirect and set listen-ports to '[{"HTTP": 80}]' only for HTTP-only.
---
# API + health: healthcheck /health targets api-gateway only (no frontend probes)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-ingress-api
  namespace: payflow
  annotations:
    alb.ingress.kubernetes.io/group.name: payflow
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: '<ACM_CERT_ARN>'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    alb.ingress.kubernetes.io/wafv2-acl-arn: '<WAF_ARN>'
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
---
# Frontend: healthcheck / so ALB probes the app root, not /health (frontend may not serve /health)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-ingress-frontend
  namespace: payflow
  annotations:
    alb.ingress.kubernetes.io/group.name: payflow
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: '<ACM_CERT_ARN>'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    alb.ingress.kubernetes.io/wafv2-acl-arn: '<WAF_ARN>'
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
