# Give backend services time to connect to RDS/Redis/RabbitMQ before health probes.
# Without this, readiness at 5s and liveness at 30s can kill pods before they connect (503 -> restart loop).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
        - name: auth-service
          livenessProbe:
            initialDelaySeconds: 60
          readinessProbe:
            initialDelaySeconds: 30
---
