apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payflow

resources:
  - ../../base
  - ../../backup/postgres-backup.yaml
  - eks-external-secrets.yaml
  - ingress-patch.yaml

patches:
  - path: db-config-patch.yaml
  - path: db-migration-patch.yaml
  # Append PGSSLMODE=require for RDS; does not depend on env order (avoids index-3 fragility)
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: wallet-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: transaction-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: notification-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - path: probe-delays-patch.yaml  # Extra time for RDS/Redis/MQ TLS handshake on cold start
  - path: hpa-minreplicas-patch.yaml
  - path: pdb-patch.yaml
  - path: postgres-backup-patch.yaml
  - path: image-pull-policy-patch.yaml
  - path: cronjob-timeout-handler-patch.yaml
  - path: resource-patch.yaml

labels:
  - pairs:
      environment: production
      cloud-provider: aws
      cluster: eks
    includeSelectors: false

images:
  - name: veeno/api-gateway
    newName: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/payflow-eks-cluster/api-gateway
    newTag: <IMAGE_TAG>
  - name: veeno/auth-service
    newName: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/payflow-eks-cluster/auth-service
    newTag: <IMAGE_TAG>
  - name: veeno/wallet-service
    newName: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/payflow-eks-cluster/wallet-service
    newTag: <IMAGE_TAG>
  - name: veeno/transaction-service
    newName: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/payflow-eks-cluster/transaction-service
    newTag: <IMAGE_TAG>
  - name: veeno/notification-service
    newName: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/payflow-eks-cluster/notification-service
    newTag: <IMAGE_TAG>
  - name: veeno/frontend
    newName: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/payflow-eks-cluster/frontend
    newTag: <IMAGE_TAG>
