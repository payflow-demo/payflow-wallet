# Patch for EKS - non-sensitive config only. DB_HOST, DB_PORT, REDIS_URL, RABBITMQ_URL come from db-secrets (ESO).
# Include DB_NAME here because this patch replaces base app-config data; migration job and apps use configMapKeyRef for DB_NAME.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: payflow
data:
  DB_NAME: "payflow"
  PGSSLMODE: "require"  # RDS requires SSL; backup and migration use this
  AUTH_SERVICE_URL: "http://auth-service:3004"
  WALLET_SERVICE_URL: "http://wallet-service:3001"
  TRANSACTION_SERVICE_URL: "http://transaction-service:3002"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3003"


