# EKS: RDS requires SSL; CronJob must set PGSSLMODE=require
apiVersion: batch/v1
kind: CronJob
metadata:
  name: transaction-timeout-handler
  namespace: payflow
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: transaction-timeout-container
            env:
            - name: PGSSLMODE
              value: "require"
