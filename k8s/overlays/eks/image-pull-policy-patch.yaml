# On EKS, images are tagged with explicit version tags (not :latest).
# IfNotPresent = use cached image on node if available → faster restarts, no ECR dependency on every pod start.
# Always = re-pull on every pod start → slower, fails if ECR/NAT temporarily unreachable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: api-gateway
        imagePullPolicy: IfNotPresent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: auth-service
        imagePullPolicy: IfNotPresent
