# Local overlay only: Ingress for payflow.local (MicroK8s). Not used by EKS or AKS.
# After deploy: add to /etc/hosts (see scripts/setup-hosts-payflow-local.sh)
#   Frontend: http://www.payflow.local
#   API (direct): http://api.payflow.local
#
# How routing works:
#   The React app is built with REACT_APP_API_URL=/api (relative URL).
#   So all API calls go to www.payflow.local/api/* (same host as the frontend).
#   This ingress splits traffic on www.payflow.local by path:
#     /api  → api-gateway:80   (must come FIRST — more specific path wins)
#     /     → frontend:80
#   Order matters: Kubernetes evaluates rules top-to-bottom within a host.
#
# Why api.payflow.local is also kept:
#   Useful for direct API testing (curl, Postman) without going through the frontend host.
#   EKS uses the ALB and its own ingress-patch.yaml — this file is never applied there.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-http-ingress
  namespace: payflow
  labels:
    environment: local
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: public
  rules:
  # ---------------------------------------------------------------
  # www.payflow.local — split by path
  # /api/* → api-gateway  (checked first; more specific wins)
  # /      → frontend
  # ---------------------------------------------------------------
  - host: www.payflow.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  # ---------------------------------------------------------------
  # payflow.local (bare domain) — same path split as www
  # ---------------------------------------------------------------
  - host: payflow.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  # ---------------------------------------------------------------
  # api.payflow.local — direct API access (curl / Postman testing)
  # ---------------------------------------------------------------
  - host: api.payflow.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
