# Local only: set NODE_ENV=development so apps allow default DB password (payflow123).
# EKS overlay never uses this; production keeps NODE_ENV=production and real secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: api-gateway
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: auth-service
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: wallet-service
        env:
        - name: NODE_ENV
          value: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: transaction-service
