# Local/MicroK8s only: longer probe delays so api-gateway and auth-service become Ready
# before receiving traffic (avoids 502 when frontend proxies to api-gateway).
# EKS/AKS use their own overlay patches; this file is not referenced there.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          livenessProbe:
            initialDelaySeconds: 45
          readinessProbe:
            initialDelaySeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
        - name: auth-service
          livenessProbe:
            initialDelaySeconds: 60
          readinessProbe:
            initialDelaySeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
        - name: notification-service
          livenessProbe:
            initialDelaySeconds: 60
            timeoutSeconds: 3
          readinessProbe:
            initialDelaySeconds: 25
            timeoutSeconds: 3
            failureThreshold: 6
