# Local / production-like: raise namespace quota so all replicas can schedule (no scale-down).
# Base quota (4 CPU, 8Gi) is for small clusters; with multiple workers we need more headroom.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: payflow-resource-quota
  namespace: payflow
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "16Gi"
    limits.cpu: "20"
    limits.memory: "32Gi"
    pods: "60"
    services: "10"
    persistentvolumeclaims: "5"
    secrets: "20"
    configmaps: "15"
