# Patch for Local Development
# Uses self-hosted infrastructure (postgres, redis, rabbitmq) from infrastructure/
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: payflow
data:
  # Local self-hosted PostgreSQL
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "payflow"
  
  # Local self-hosted Redis
  REDIS_URL: "redis://redis:6379"
  
  # Local self-hosted RabbitMQ
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  
  # Service URLs (unchanged - internal Kubernetes DNS)
  AUTH_SERVICE_URL: "http://auth-service:3004"
  WALLET_SERVICE_URL: "http://wallet-service:3001"
  TRANSACTION_SERVICE_URL: "http://transaction-service:3002"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3003"

