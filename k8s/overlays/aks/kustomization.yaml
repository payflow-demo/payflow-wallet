apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payflow

resources:
  - ../../base
  - ../../infrastructure/rabbitmq.yaml  # Self-hosted RabbitMQ (amqplib requires AMQP 0-9-1; Azure Service Bus is AMQP 1.0)
  - aks-external-secrets.yaml

patches:
  - path: db-config-patch.yaml
  - path: db-migration-patch.yaml
  - path: ingress-patch.yaml
  - path: probe-delays-patch.yaml  # Extra time for Azure PostgreSQL/Redis TLS on cold start
  # Azure PostgreSQL requires SSL — append PGSSLMODE=require to each service deployment
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: wallet-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: transaction-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: notification-service
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGSSLMODE
          value: "require"

labels:
  - pairs:
      environment: production
      cloud-provider: azure
      cluster: aks
    includeSelectors: false

# All images pulled from ACR — tag is substituted by deploy.sh at deploy time
images:
  - name: veeno/api-gateway
    newName: <ACR_NAME>.azurecr.io/payflow/api-gateway
    newTag: <IMAGE_TAG>
  - name: veeno/auth-service
    newName: <ACR_NAME>.azurecr.io/payflow/auth-service
    newTag: <IMAGE_TAG>
  - name: veeno/wallet-service
    newName: <ACR_NAME>.azurecr.io/payflow/wallet-service
    newTag: <IMAGE_TAG>
  - name: veeno/transaction-service
    newName: <ACR_NAME>.azurecr.io/payflow/transaction-service
    newTag: <IMAGE_TAG>
  - name: veeno/notification-service
    newName: <ACR_NAME>.azurecr.io/payflow/notification-service
    newTag: <IMAGE_TAG>
  - name: veeno/frontend
    newName: <ACR_NAME>.azurecr.io/payflow/frontend
    newTag: <IMAGE_TAG>

