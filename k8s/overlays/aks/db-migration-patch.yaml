# Patch for AKS - Database Migration Job
# This patch updates the migration job to work with Azure PostgreSQL Flexible Server
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-job
  namespace: payflow
spec:
  template:
    spec:
      containers:
      - name: db-migration
        # command must be overridden alongside args — without it the base job's command
        # is inherited but the args block here replaces the base args, causing a mismatch.
        command: ['sh', '-c']
        # Azure PostgreSQL requires SSL connection
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_USER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_PASSWORD
        # Azure PostgreSQL requires SSL
        - name: PGSSLMODE
          value: "require"
        # Azure PostgreSQL uses specific SSL settings
        - name: PGSSLROOTCERT
          value: "/etc/ssl/certs/ca-certificates.crt"
        args:
        - |
          set -e
          echo "Connecting to Azure PostgreSQL Flexible Server..."
          
          # Wait for Azure PostgreSQL to be ready
          until pg_isready -h ${DB_HOST} -p ${DB_PORT} -U ${DB_USER} --timeout=10; do
            echo "Azure PostgreSQL not ready, waiting..."
            sleep 5
          done
          
          echo "Azure PostgreSQL is ready! Running migrations..."
          
          # Run migrations with SSL
          if [ -d "/migrations" ] && [ "$(ls -A /migrations/*.sql 2>/dev/null)" ]; then
            for migration in /migrations/*.sql; do
              echo "Executing: $migration"
              psql "host=${DB_HOST} port=${DB_PORT} user=${DB_USER} dbname=${DB_NAME} sslmode=require" -f "$migration"
            done
          else
            # Inline migrations (same as base)
            psql "host=${DB_HOST} port=${DB_PORT} user=${DB_USER} dbname=${DB_NAME} sslmode=require" <<EOF
            -- V1: Initial Schema
            CREATE TABLE IF NOT EXISTS users (
              id VARCHAR(50) PRIMARY KEY,
              email VARCHAR(255) UNIQUE NOT NULL,
              password_hash VARCHAR(255) NOT NULL,
              name VARCHAR(100) NOT NULL,
              role VARCHAR(20) DEFAULT 'user',
              is_active BOOLEAN DEFAULT true,
              email_verified BOOLEAN DEFAULT false,
              two_factor_enabled BOOLEAN DEFAULT false,
              two_factor_secret VARCHAR(255),
              failed_login_attempts INT DEFAULT 0,
              locked_until TIMESTAMP,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              last_login_at TIMESTAMP,
              last_login_ip VARCHAR(45)
            );
            
            CREATE TABLE IF NOT EXISTS wallets (
              user_id VARCHAR(50) PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,
              name VARCHAR(100) NOT NULL,
              balance DECIMAL(15,2) NOT NULL DEFAULT 0.00,
              currency VARCHAR(3) DEFAULT 'USD',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            
            CREATE TABLE IF NOT EXISTS transactions (
              id VARCHAR(50) PRIMARY KEY,
              from_user_id VARCHAR(50) NOT NULL,
              to_user_id VARCHAR(50) NOT NULL,
              amount DECIMAL(15,2) NOT NULL,
              status VARCHAR(20) NOT NULL,
              error_message TEXT,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              processing_started_at TIMESTAMP,
              completed_at TIMESTAMP,
              CONSTRAINT fk_from_user FOREIGN KEY (from_user_id) REFERENCES users(id),
              CONSTRAINT fk_to_user FOREIGN KEY (to_user_id) REFERENCES users(id)
            );
            
            CREATE TABLE IF NOT EXISTS notifications (
              id SERIAL PRIMARY KEY,
              user_id VARCHAR(50) NOT NULL REFERENCES users(id) ON DELETE CASCADE,
              type VARCHAR(50) NOT NULL,
              channel VARCHAR(20) NOT NULL,
              subject VARCHAR(255),
              message TEXT,
              status VARCHAR(20) NOT NULL,
              error_message TEXT,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              sent_at TIMESTAMP
            );
            
            CREATE TABLE IF NOT EXISTS refresh_tokens (
              id SERIAL PRIMARY KEY,
              user_id VARCHAR(50) REFERENCES users(id) ON DELETE CASCADE,
              token VARCHAR(500) UNIQUE NOT NULL,
              expires_at TIMESTAMP NOT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              ip_address VARCHAR(45),
              user_agent TEXT
            );
            
            CREATE TABLE IF NOT EXISTS user_sessions (
              id SERIAL PRIMARY KEY,
              user_id VARCHAR(50) REFERENCES users(id) ON DELETE CASCADE,
              session_token VARCHAR(500) UNIQUE NOT NULL,
              ip_address VARCHAR(45),
              user_agent TEXT,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              expires_at TIMESTAMP NOT NULL
            );
            EOF
            
            # V2: Indexes
            psql "host=${DB_HOST} port=${DB_PORT} user=${DB_USER} dbname=${DB_NAME} sslmode=require" <<EOF
            CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
            CREATE INDEX IF NOT EXISTS idx_wallets_user_id ON wallets(user_id);
            CREATE INDEX IF NOT EXISTS idx_transactions_from_user ON transactions(from_user_id, created_at DESC);
            CREATE INDEX IF NOT EXISTS idx_transactions_to_user ON transactions(to_user_id, created_at DESC);
            CREATE INDEX IF NOT EXISTS idx_transactions_status ON transactions(status);
            CREATE INDEX IF NOT EXISTS idx_notifications_user ON notifications(user_id, created_at DESC);
            CREATE INDEX IF NOT EXISTS idx_notifications_status ON notifications(status);
            CREATE INDEX IF NOT EXISTS idx_refresh_tokens_user ON refresh_tokens(user_id);
            CREATE INDEX IF NOT EXISTS idx_refresh_tokens_expires ON refresh_tokens(expires_at);
            CREATE INDEX IF NOT EXISTS idx_sessions_user ON user_sessions(user_id);
            CREATE INDEX IF NOT EXISTS idx_sessions_expires ON user_sessions(expires_at);
            EOF
          fi
          
          echo "Database migrations completed successfully on Azure PostgreSQL"

