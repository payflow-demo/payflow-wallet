# Patch for AKS - Ingress Configuration
# AKS uses NGINX Ingress Controller or Azure Application Gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-ingress
  namespace: payflow
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Or use Azure Application Gateway
    # kubernetes.io/ingress.class: azure/application-gateway
    # appgw.ingress.kubernetes.io/ssl-redirect: "true"
    # appgw.ingress.kubernetes.io/appgw-ssl-certificate: "payflow-tls-cert"
spec:
  ingressClassName: nginx  # or azure-application-gateway
  tls:
  - hosts:
    - api.payflow.com
    secretName: payflow-tls-cert
  rules:
  - host: api.payflow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80

