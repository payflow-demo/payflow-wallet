# AKS: extended probe delays for Azure PostgreSQL / Azure Cache for Redis / RabbitMQ cold starts.
# Azure managed services have TLS handshake overhead on first connection — services need more
# time before health probes fire, otherwise readiness failures trigger unnecessary pod restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: payflow
spec:
  template:
    spec:
      containers:
        - name: auth-service
          livenessProbe:
            initialDelaySeconds: 60
          readinessProbe:
            initialDelaySeconds: 30
---
