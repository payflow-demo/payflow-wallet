# Patch for AKS — non-sensitive config only.
# DB_HOST, DB_PORT, DB_PASSWORD, DB_USER, REDIS_URL, JWT_SECRET all come from db-secrets (ESO → Azure Key Vault).
# Do NOT put DB_HOST or REDIS_URL here — they belong in the Secret so ESO manages them.
#
# RABBITMQ_URL: self-hosted in-cluster RabbitMQ (amqplib is AMQP 0-9-1; Azure Service Bus is 1.0 — incompatible).
# PGSSLMODE: Azure PostgreSQL Flexible Server requires SSL on all connections.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: payflow
data:
  DB_NAME: "payflow"
  PGSSLMODE: "require"

  # RabbitMQ runs as a StatefulSet inside the cluster (see k8s/infrastructure/rabbitmq.yaml)
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"

  # Internal Kubernetes DNS — same across all cloud environments
  AUTH_SERVICE_URL: "http://auth-service:3004"
  WALLET_SERVICE_URL: "http://wallet-service:3001"
  TRANSACTION_SERVICE_URL: "http://transaction-service:3002"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3003"
  CORS_ORIGIN: ""

