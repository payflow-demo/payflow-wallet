# External Secrets for AKS — Azure Key Vault Integration
# Requires: External Secrets Operator installed in the cluster
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Key Vault secret names expected (set these in Azure Key Vault before deploying):
#   payflow-postgres-credentials  → { username, password, host, port }
#   payflow-app-secrets           → { jwt-secret }
#   payflow-redis                 → { url }    e.g. rediss://:password@host.redis.cache.windows.net:6380
#   payflow-rabbitmq-credentials  → { username, password }
#
# All keys consumed here populate the 'db-secrets' Secret that every deployment reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secrets-external
  namespace: payflow
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: azure-key-vault
    kind: SecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
  # ---- PostgreSQL (Azure Database for PostgreSQL Flexible Server) ----
  - secretKey: DB_USER
    remoteRef:
      key: payflow-postgres-credentials
      property: username
  - secretKey: DB_PASSWORD
    remoteRef:
      key: payflow-postgres-credentials
      property: password
  - secretKey: DB_HOST
    remoteRef:
      key: payflow-postgres-credentials
      property: host
  - secretKey: DB_PORT
    remoteRef:
      key: payflow-postgres-credentials
      property: port
  # ---- App secrets ----
  - secretKey: JWT_SECRET
    remoteRef:
      key: payflow-app-secrets
      property: jwt-secret
  # ---- Redis (Azure Cache for Redis — TLS on port 6380, rediss:// scheme) ----
  # REDIS_URL must come from the Secret (not ConfigMap) because it contains credentials.
  # Format: rediss://:password@host.redis.cache.windows.net:6380
  - secretKey: REDIS_URL
    remoteRef:
      key: payflow-redis
      property: url
  # ---- RabbitMQ (self-hosted in-cluster — credentials only, URL built from ConfigMap) ----
  - secretKey: RABBITMQ_USER
    remoteRef:
      key: payflow-rabbitmq-credentials
      property: username
  - secretKey: RABBITMQ_PASSWORD
    remoteRef:
      key: payflow-rabbitmq-credentials
      property: password
---
# SecretStore — references the Azure Key Vault instance provisioned by Terraform
# vaultUrl: set to your Key Vault URI (terraform output key_vault_uri)
# authType: WorkloadIdentity uses the AKS pod identity — no credentials in the manifest
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: azure-key-vault
  namespace: payflow
spec:
  provider:
    azurekv:
      vaultUrl: https://payflow-kv.vault.azure.net/
      authType: WorkloadIdentity
      serviceAccountRef:
        name: external-secrets

