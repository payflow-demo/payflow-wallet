# #### PayFlow API Gateway Service ####
# #### This Service exposes the API Gateway to other services and external traffic ####
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: payflow
  annotations:
    # Prometheus scrapes the pod directly via pod annotations, not this Service.
    # Keeping a single port avoids confusion when building Ingress rules (always use port 80).
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP  # #### Service type - use Ingress/ALB for external access ####
  ports:
  - name: http       # #### HTTP traffic: Ingress → Service port 80 → container port 3000 ####
    protocol: TCP
    port: 80         # #### Service port (used in Ingress rules and nginx proxy_pass) ####
    targetPort: 3000 # #### Container port (Express listens on 3000) ####
  selector:
    app: api-gateway
---
# #### PayFlow API Gateway Deployment ####
# #### This Deployment manages the API Gateway pods ####
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  replicas: 2  # #### Number of pod replicas for high availability ####
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 30  # Allow graceful shutdown (SIGTERM drain)
      containers:
      - name: api-gateway
        image: veeno/api-gateway:latest  # #### Docker Hub image ####
        imagePullPolicy: Always  # #### Pull from Docker Hub if not present locally ####
        securityContext:
          allowPrivilegeEscalation: false  # #### Prevent privilege escalation attacks ####
          runAsUser: 1000  # #### Run as UID 1000 (node user in Node.js images) ####
          runAsGroup: 1000  # #### Run as GID 1000 ####
          readOnlyRootFilesystem: false  # #### Allow writes (needed for logs, temp files) ####
        ports:
        - containerPort: 3000
        env:
        # #### Service URLs from ConfigMap ####
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: AUTH_SERVICE_URL
        - name: WALLET_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: WALLET_SERVICE_URL
        - name: TRANSACTION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: TRANSACTION_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NOTIFICATION_SERVICE_URL
        - name: NODE_ENV
          value: "production"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: JWT_SECRET
              optional: false
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: REDIS_URL
              optional: true
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CORS_ORIGIN
              optional: true
        # #### Database credentials — required for the api-gateway health check pool ####
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        # #### Optional Configuration (uncomment if needed) ####
        # - name: PORT
        #   value: "3000"  # #### Service port (defaults to 3000) ####
        # - name: SERVICE_NAME
        #   value: "api-gateway"  # #### Service name for logging ####
        # - name: CONTAINER_ENV
        #   value: "true"  # #### Enable container-aware logging ####
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

