# ============================================
# Network Policies for PayFlow
# ============================================
# Purpose: Implement network segmentation and security controls
# Controls traffic flow between pods based on labels and namespaces
# 
# Why We Need This:
# - Prevents unauthorized pod-to-pod communication
# - Implements "least privilege" network access
# - Limits attack surface if a pod is compromised
# - Enforces microservices security boundaries
#
# What Happens Without It:
# - All pods can communicate with each other (default Kubernetes behavior)
# - If one pod is compromised, attacker can access all services
# - No network-level isolation between services
# - Difficult to detect unauthorized access attempts
#
# How It Works:
# - Default deny all traffic (default-deny-all)
# - Explicitly allow only necessary connections
# - Traffic is allowed only if it matches a policy rule
# - Works at the network layer (before application layer)

# ============================================
# Default Deny All Traffic
# ============================================
# This policy denies ALL traffic by default
# Other policies then explicitly allow what's needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: payflow
spec:
  podSelector: {}  # Match all pods in namespace
  policyTypes:
  - Ingress  # Control incoming traffic
  - Egress   # Control outgoing traffic
  # No rules = deny all traffic (default deny)
---
# ============================================
# Allow API Gateway to Receive External Traffic
# ============================================
# Purpose: Allow API Gateway to receive traffic from external sources
# (LoadBalancer, Ingress Controller, port-forward, etc.)
# CRITICAL: Ingress controller is in kube-system namespace, NOT payflow namespace
# So we can't use podSelector (same namespace only), must allow from all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-allow-ingress
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from: []  # Allow from ANY namespace (ingress controller, load balancer, port-forward)
    ports:
    - protocol: TCP
      port: 3000
---
# ============================================
# Allow Frontend to Receive External Traffic
# ============================================
# Purpose: Allow Frontend to receive traffic from external sources
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow-ingress
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from: []  # Allow from anywhere (ingress controller, load balancer, port-forward)
    ports:
    - protocol: TCP
      port: 80
---
# ============================================
# Allow API Gateway to Connect to Backend Services
# ============================================
# Purpose: Allow API Gateway to route requests to backend services
# This is the only way API Gateway can communicate with backends
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-allow-egress
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Egress
  egress:
  # Allow API Gateway to connect to backend services
  - to:
    - podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 3004
  - to:
    - podSelector:
        matchLabels:
          app: wallet-service
    ports:
    - protocol: TCP
      port: 3001
  - to:
    - podSelector:
        matchLabels:
          app: transaction-service
    ports:
    - protocol: TCP
      port: 3002
  - to:
    - podSelector:
        matchLabels:
          app: notification-service
    ports:
    - protocol: TCP
      port: 3003
  # Allow DNS resolution (required for service discovery)
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS for external API calls (if needed for webhooks, etc.)
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
# ============================================
# Allow Backend Services to Connect to Database
# ============================================
# Purpose: Allow backend services to access databases and message queues
# Only services that need database access can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: services-allow-db
  namespace: payflow
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - auth-service
      - wallet-service
      - transaction-service
      - notification-service
  policyTypes:
  - Egress
  egress:
  # Allow connection to PostgreSQL (podSelector for local, ipBlock for managed services like RDS)
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - ipBlock:
        cidr: 10.0.0.0/8  # Private RFC1918 - covers EKS + managed service subnets (RDS, ElastiCache, MQ)
    ports:
    - protocol: TCP
      port: 5432
  # Allow connection to Redis (podSelector for local, ipBlock for managed services like ElastiCache)
  # Port 6379 = non-TLS; 6380 = ElastiCache TLS (in-transit encryption)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    - ipBlock:
        cidr: 10.0.0.0/8  # Private RFC1918 - covers EKS + managed service subnets
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 6380
  # Allow connection to RabbitMQ (podSelector for local, ipBlock for managed services like Amazon MQ)
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    - ipBlock:
        cidr: 10.0.0.0/8  # Private RFC1918 - covers EKS + managed service subnets
    ports:
    - protocol: TCP
      port: 5672  # RabbitMQ plain AMQP (local / self-hosted)
    - protocol: TCP
      port: 5671  # Amazon MQ / RabbitMQ TLS (EKS managed)
  # Allow DNS (required for service discovery)
  - to: []
    ports:
    - protocol: UDP
      port: 53
---
# ============================================
# Allow Databases to RECEIVE from Backend Services
# ============================================
# PURPOSE: PostgreSQL, Redis, and RabbitMQ need INGRESS rules
# Without this, backend services can SEND but databases can't RECEIVE
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: databases-allow-ingress-from-services
  namespace: payflow
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - postgres
      - redis
      - rabbitmq
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic FROM backend services
  - from:
    - podSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - auth-service
          - wallet-service
          - transaction-service
          - notification-service
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5672  # RabbitMQ plain AMQP (local / self-hosted)
    - protocol: TCP
      port: 5671  # Amazon MQ / RabbitMQ TLS (EKS managed)
  # Allow traffic FROM postgres-exporter
  - from:
    - podSelector:
        matchLabels:
          app: postgres-exporter
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
  # Allow traffic FROM CronJob pods to postgres
  - from:
    - podSelector:
        matchLabels:
          cronjob: transaction-timeout-handler
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
---
# ============================================
# Allow Transaction Service to Connect to Wallet Service
# ============================================
# Purpose: Allow Transaction Service to call Wallet Service for balance updates
# This is a specific service-to-service communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: transaction-service-allow-wallet
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: transaction-service
  policyTypes:
  - Egress
  egress:
  # Allow Transaction Service to call Wallet Service
  - to:
    - podSelector:
        matchLabels:
          app: wallet-service
    ports:
    - protocol: TCP
      port: 3001
  # Allow connection to RabbitMQ (for publishing transaction events)
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    - ipBlock:
        cidr: 10.0.0.0/8  # Private RFC1918 - covers EKS + managed service subnets (Amazon MQ)
    ports:
    - protocol: TCP
      port: 5672  # RabbitMQ plain AMQP (local / self-hosted)
    - protocol: TCP
      port: 5671  # Amazon MQ / RabbitMQ TLS (EKS managed)
  # Allow DNS (required for service discovery)
  - to: []
    ports:
    - protocol: UDP
      port: 53

---
# ============================================
# Allow Backend Services to RECEIVE from API Gateway
# ============================================
# PURPOSE: Backend services need INGRESS rules to receive traffic
# Without this, API Gateway can SEND but backends can't RECEIVE
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-services-allow-ingress-from-api-gateway
  namespace: payflow
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - auth-service
      - wallet-service
      - transaction-service
      - notification-service
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic FROM api-gateway
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 3004  # auth-service
    - protocol: TCP
      port: 3001  # wallet-service
    - protocol: TCP
      port: 3002  # transaction-service
    - protocol: TCP
      port: 3003  # notification-service
---
# ============================================
# Allow Wallet Service to RECEIVE from Transaction Service
# ============================================
# PURPOSE: Wallet service needs INGRESS rule to receive transfer requests
# Without this, transaction-service can SEND but wallet-service can't RECEIVE
# This is why transactions were failing - wallet-service couldn't respond
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wallet-service-allow-ingress-from-transaction
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: wallet-service
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic FROM transaction-service
  - from:
    - podSelector:
        matchLabels:
          app: transaction-service
    ports:
    - protocol: TCP
      port: 3001  # wallet-service port
---
# ============================================
# Allow CronJob Pods (Transaction Timeout Handler) Network Access
# ============================================
# PURPOSE: CronJob pods need to query DNS and connect to PostgreSQL
# Without this, they fail with "could not translate host name" errors
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cronjob-allow-dns-and-db
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      cronjob: transaction-timeout-handler  # Match CronJob pods
  policyTypes:
  - Egress
  egress:
  # Allow DNS queries to kube-system namespace (CoreDNS)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53  # DNS
    - protocol: TCP
      port: 53  # DNS
  # Allow connections to PostgreSQL (podSelector for in-cluster postgres, ipBlock for RDS/ElastiCache on EKS)
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - ipBlock:
        cidr: 10.0.0.0/8
    ports:
    - protocol: TCP
      port: 5432
---
# ============================================
# Allow Postgres Exporter Network Access
# ============================================
# PURPOSE: postgres-exporter needs DNS and database access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-exporter-allow-dns-and-db
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: postgres-exporter
  policyTypes:
  - Egress
  egress:
  # Allow DNS queries
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # kube-dns is reached via Service ClusterIP; some CNIs enforce policy before DNAT, so the
  # namespaceSelector above does not match and DNS times out. Port 53 only.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow connections to PostgreSQL (podSelector for in-cluster postgres, ipBlock for RDS on EKS)
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - ipBlock:
        cidr: 10.0.0.0/8
    ports:
    - protocol: TCP
      port: 5432
---
# PURPOSE: redis-exporter needs DNS and Redis access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-exporter-allow-dns-and-redis
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: redis-exporter
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow connection to Redis (podSelector for in-cluster, ipBlock for ElastiCache on EKS)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    - ipBlock:
        cidr: 10.0.0.0/8
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 6380
---
# ============================================
# Allow Prometheus to Scrape Metrics
# ============================================
# PURPOSE: Prometheus runs in 'monitoring' namespace and needs to scrape
# metrics from services in 'payflow' namespace
# Without this, Prometheus cannot access /metrics endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      # Match all PayFlow services that expose metrics
      # Services use metricsMiddleware from shared/metrics.js
      # This matches: api-gateway, wallet-service, transaction-service, etc.
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic FROM Prometheus in monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring  # monitoring namespace
      podSelector:
        matchLabels:
          app: prometheus  # Prometheus pod
    ports:
    - protocol: TCP
      port: 3000  # API Gateway metrics port
---
# Allow Prometheus to scrape wallet-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-wallet
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      app: wallet-service
  policyTypes:
