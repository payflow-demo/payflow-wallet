---
# Allow DB migration job to reach RDS and DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-migration-allow-egress
  namespace: payflow
spec:
  podSelector:
    matchLabels:
      job-name: db-migration-job
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.0.0.0/8
    ports:
    - protocol: TCP
      port: 5432
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
