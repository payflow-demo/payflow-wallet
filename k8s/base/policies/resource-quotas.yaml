# ============================================
# Resource Quotas for PayFlow Namespace
# ============================================
# Purpose: Limit total resource consumption per namespace
# 
# Why We Need This:
# - Prevents resource exhaustion (one service consuming all resources)
# - Ensures fair resource allocation across services
# - Protects cluster from runaway processes
# - Enables multi-tenant environments (multiple namespaces)
# - Helps with capacity planning and budgeting
# - Prevents "noisy neighbor" problems
#
# What Happens Without It:
# - Services can consume unlimited resources
# - One misbehaving service can starve others
# - Cluster can run out of resources unexpectedly
# - No protection against resource leaks
# - Difficult to predict resource needs
# - Can't enforce resource limits per namespace
#
# How It Works:
# - Sets hard limits on total resources in namespace
# - Applies to all pods in the namespace
# - Prevents new pods from being created if quota exceeded
# - Works with Resource Requests and Limits in deployments
# - Enforced at pod creation time
#
# Example Scenario:
# - Quota: 4 CPU requests, 8GB memory requests
# - Service tries to create pod with 5 CPU request
# - Pod creation fails: "exceeded quota"
# - Forces proper resource planning

apiVersion: v1
kind: ResourceQuota
metadata:
  name: payflow-resource-quota
  namespace: payflow
spec:
  hard:
    # ============================================
    # Compute Resources - Requests
    # ============================================
    # Total CPU requests across all pods
    # Example: 2 pods × 250m = 500m, 3 pods × 250m = 750m
    # Current total: ~2.5 CPU (all services combined)
    requests.cpu: "4"           # Total CPU requests: 4 cores
    
    # Total memory requests across all pods
    # Example: 2 pods × 256Mi = 512Mi
    # Current total: ~2GB (all services combined)
    requests.memory: "8Gi"       # Total memory requests: 8GB
    
    # ============================================
    # Compute Resources - Limits
    # ============================================
    # Total CPU limits across all pods
    # Limits are maximum resources a pod can use
    # Allow headroom for db-migration-job (500m) on top of app pods (~7.8)
    limits.cpu: "10"             # Total CPU limits: 10 cores
    
    # Total memory limits across all pods
    # Current total: ~4GB (all services) + migration job
    limits.memory: "20Gi"        # Total memory limits: 20GB
    
    # ============================================
    # Object Counts
    # ============================================
    # Maximum number of pods in namespace
    # Prevents creating too many pods (accidental or malicious)
    # Increased to 30 to accommodate CronJob pods
    pods: "60"                   # Maximum 30 pods
    
    # Maximum number of services (app + postgres/redis/rabbitmq + monitoring exporters)
    services: "20"
    
    # Maximum number of PersistentVolumeClaims
    # Storage is expensive - limit PVCs to prevent over-provisioning
    persistentvolumeclaims: "5"  # Maximum 5 PVCs
    
    # Maximum number of secrets
    # Secrets are stored in etcd - limit to prevent bloat
    secrets: "20"                # Maximum 10 secrets
    
    # Maximum number of configmaps
    # ConfigMaps are stored in etcd - limit to prevent bloat
    configmaps: "15"             # Maximum 15 configmaps

