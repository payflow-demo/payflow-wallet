# ============================================
# Container Image Scanning CronJob (Trivy) - Registry Version
# ============================================
# Purpose: Automated security scanning of container images from registries
# Why: Images in Docker Hub, ECR, ACR, GCR need registry authentication
# When: Runs daily at 3 AM UTC
# What happens without it: Vulnerable images deployed unknowingly, security risks

apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-scanning-registry
  namespace: payflow
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trivy-scanner
            image: aquasec/trivy:latest
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting image vulnerability scan from registry..."
              
              # Setup report directory
              mkdir -p /reports
              
              # ============================================
              # Registry Configuration
              # ============================================
              # Images to scan from registry
              # Format: <registry>/<namespace>/<image>:<tag>
              # Examples:
              # - Docker Hub: docker.io/yourusername/payflow-api-gateway:latest
              # - ECR: 123456789012.dkr.ecr.us-east-1.amazonaws.com/payflow-api-gateway:latest
              # - ACR: yourregistry.azurecr.io/payflow-api-gateway:latest
              # - GCR: gcr.io/your-project/payflow-api-gateway:latest
              
              IMAGES="
              docker.io/veeno/api-gateway:latest
              docker.io/veeno/auth-service:latest
              docker.io/veeno/wallet-service:latest
              docker.io/veeno/transaction-service:latest
              docker.io/veeno/notification-service:latest
              docker.io/veeno/frontend:latest
              "
              
              # ============================================
              # Registry Authentication (if needed)
              # ============================================
              # For private registries, authenticate first
              # Docker Hub:
              # echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
              
              # AWS ECR:
              # aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 123456789012.dkr.ecr.us-east-1.amazonaws.com
              
              # Azure ACR:
              # az acr login --name yourregistry
              
              # Google GCR:
              # gcloud auth configure-docker
              
              # Scan each image
              for IMAGE in $IMAGES; do
                # Skip empty lines
                [ -z "$IMAGE" ] && continue
                
                echo "Scanning $IMAGE from registry..."
                REPORT_FILE="/reports/$(echo $IMAGE | tr '/:' '-')-$(date +%Y%m%d).json"
                
                # ============================================
                # Trivy Scan from Registry
                # ============================================
                # Trivy can pull images directly from registries
                # No need for Docker/containerd socket when scanning from registry
                trivy image \
                  --format json \
                  --output "$REPORT_FILE" \
                  --severity HIGH,CRITICAL \
                  "$IMAGE" || true
                
                # Generate summary
                if [ -f "$REPORT_FILE" ]; then
                  VULNS=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "$REPORT_FILE" 2>/dev/null || echo "0")
                  echo "Found $VULNS vulnerabilities in $IMAGE"
                fi
              done
              
              echo "Scan complete. Reports saved to /reports"
            
            # ============================================
            # Environment Variables for Registry Auth
            # ============================================
            env:
            # Docker Hub credentials (if using Docker Hub)
            - name: DOCKERHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: registry-secrets
                  key: DOCKERHUB_USERNAME
                  optional: true  # Optional - only needed for private repos
            - name: DOCKERHUB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: registry-secrets
                  key: DOCKERHUB_PASSWORD
                  optional: true
            
            # AWS ECR credentials (if using ECR)
            - name: AWS_REGION
              value: "us-east-1"  # Change to your region
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: registry-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            
            # Azure ACR credentials (if using ACR)
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: registry-secrets
                  key: AZURE_CLIENT_ID
                  optional: true
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: registry-secrets
                  key: AZURE_CLIENT_SECRET
                  optional: true
            
            volumeMounts:
            # Reports directory
            - name: reports
              mountPath: /reports
          
          volumes:
          # Temporary storage for reports
          - name: reports
            emptyDir: {}

