# ============================================
# Container Image Scanning CronJob (Trivy) - Containerd Version
# ============================================
# Purpose: Automated security scanning of container images using containerd
# Why: MicroK8s uses containerd, not Docker, so we need containerd socket access
# When: Runs daily at 3 AM UTC
# What happens without it: Vulnerable images deployed unknowingly, security risks

apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-scanning-containerd
  namespace: payflow
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trivy-scanner
            image: aquasec/trivy:latest
            env:
            # ============================================
            # Containerd Configuration
            # ============================================
            # Tell Trivy to use containerd socket
            - name: CONTAINERD_ADDRESS
              value: "/run/containerd/containerd.sock"
            # Containerd namespace (k8s.io is default for Kubernetes)
            - name: CONTAINERD_NAMESPACE
              value: "k8s.io"
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting image vulnerability scan with containerd..."
              echo "CONTAINERD_ADDRESS: $CONTAINERD_ADDRESS"
              echo "CONTAINERD_NAMESPACE: $CONTAINERD_NAMESPACE"
              
              # Install containerd CLI (ctr) if not available
              # Trivy image is based on distroless, so we need to check alternatives
              # For now, we'll use Trivy's remote scanning or try to access via socket
              
              # Setup report directory
              mkdir -p /reports
              
              # Verify containerd socket is accessible
              if [ ! -S "$CONTAINERD_ADDRESS" ]; then
                echo "ERROR: Containerd socket not found at $CONTAINERD_ADDRESS"
                exit 1
              fi
              echo "Containerd socket found and accessible"
              
              # Images to scan (space-separated for POSIX compatibility)
              # Note: Containerd stores images with full registry path
              # Check actual names with: multipass exec microk8s-vm -- sudo microk8s ctr images ls | grep payflow
              # Format: <registry>/<namespace>/<image>:<tag>
              IMAGES="docker.io/payflow/api-gateway:latest docker.io/payflow/auth-service:latest docker.io/payflow/wallet-service:latest docker.io/payflow/transaction-service:latest docker.io/payflow/notification-service:latest localhost:32000/payflow-frontend:latest"
              
              # Scan each image using containerd
              for IMAGE in $IMAGES; do
                echo "Scanning $IMAGE..."
                REPORT_FILE="/reports/$(echo $IMAGE | tr '/:' '-')-$(date +%Y%m%d).json"
                
                # ============================================
                # Trivy with Containerd - Using Environment Variables
                # ============================================
                # With CONTAINERD_ADDRESS and CONTAINERD_NAMESPACE set,
                # Trivy should automatically use containerd when scanning images
                # Just use the full image name as stored in containerd
                
                echo "Scanning $IMAGE with containerd..."
                
                # Trivy will use containerd automatically via CONTAINERD_ADDRESS env var
                trivy image \
                  --format json \
                  --output "$REPORT_FILE" \
                  --severity HIGH,CRITICAL \
                  "$IMAGE" 2>&1 | grep -vE "^[0-9]{4}-[0-9]{2}-[0-9]{2}" || {
                  # If that fails, try with containerd:// prefix (strip registry)
                  echo "Trying with containerd:// prefix..."
                  if echo "$IMAGE" | grep -q "docker.io/"; then
                    IMAGE_NAME=$(echo "$IMAGE" | sed 's|docker.io/||')
                  elif echo "$IMAGE" | grep -q "localhost:32000/"; then
                    IMAGE_NAME=$(echo "$IMAGE" | sed 's|localhost:32000/||')
                  else
                    IMAGE_NAME="$IMAGE"
                  fi
                  trivy image \
                    --format json \
                    --output "$REPORT_FILE" \
                    --severity HIGH,CRITICAL \
                    "containerd://$IMAGE_NAME" 2>&1 | grep -vE "^[0-9]{4}-[0-9]{2}-[0-9]{2}" || true
                }
                
                # Generate summary
                if [ -f "$REPORT_FILE" ]; then
                  VULNS=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "$REPORT_FILE" 2>/dev/null || echo "0")
                  echo "Found $VULNS vulnerabilities in $IMAGE"
                fi
              done
              
              echo "Scan complete. Reports saved to /reports"
            volumeMounts:
            # ============================================
            # Containerd Socket Mount
            # ============================================
            # Mount containerd socket instead of Docker socket
            - name: containerd-socket
              mountPath: /run/containerd/containerd.sock
              # Why: Trivy needs access to containerd to pull and scan images
              # Path: /run/containerd/containerd.sock (standard containerd socket location)
            
            # Reports directory
            - name: reports
              mountPath: /reports
          volumes:
          # ============================================
          # Containerd Socket Volume
          # ============================================
          # For MicroK8s VM, we need to mount from the VM host
          # Note: This requires the pod to run on the same node as containerd
          - name: containerd-socket
            hostPath:
              path: /run/containerd/containerd.sock  # Containerd socket path on host
              type: Socket  # Kubernetes knows this is a socket file
            # Why: Allows container to communicate with containerd daemon
            # Security Note: This gives container access to containerd (use with caution)
          
          # Temporary storage for reports
          - name: reports
            emptyDir: {}

