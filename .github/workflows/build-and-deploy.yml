# ============================================
# PayFlow CI/CD: validate → build → push (Docker Hub and/or ECR)
# ============================================
# - Runs on push to main/master or manual (workflow_dispatch).
# - Validate: npm install in each service to catch broken package.json before building images.
# - Build: all 6 images with context ./services (shared/ included). Tag: short SHA + latest.
# - Push to Docker Hub when DOCKERHUB_USERNAME + DOCKERHUB_TOKEN are set.
# - Push to ECR when AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY are set (for EKS deploy).
# See docs/CICD.md for setup and deploy steps.
#
name: Build and Push Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'payflow-eks-cluster' }}

jobs:
  validate:
    name: Validate (deps install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend deps (verify package.json)
        run: |
          for dir in services/api-gateway services/auth-service services/wallet-service services/transaction-service services/notification-service; do
            echo "::group::$dir"
            (cd "$dir" && npm install --no-save) || exit 1
            echo "::endgroup::"
          done
      - name: Install frontend deps
        run: cd services/frontend && npm install --no-save

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/api-gateway/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.sha.outputs.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/auth-service/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ steps.sha.outputs.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push wallet-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/wallet-service/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wallet-service:${{ steps.sha.outputs.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wallet-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push transaction-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/transaction-service/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/transaction-service:${{ steps.sha.outputs.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/transaction-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/notification-service/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ steps.sha.outputs.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/frontend/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.sha.outputs.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "Image tag (use for deploy): \`${{ steps.sha.outputs.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Set \`IMAGE_TAG=${{ steps.sha.outputs.SHORT_SHA }}\` when running deploy.sh for immutable release." >> $GITHUB_STEP_SUMMARY

  # Push to ECR when AWS credentials are set (so deploy.sh can pull from ECR; avoids ImagePullBackOff).
  # Repository: Add secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY; optionally AWS_SESSION_TOKEN for assumed role.
  # Optionally set vars: AWS_REGION (default us-east-1), EKS_CLUSTER_NAME (default payflow-eks-cluster).
  push-ecr:
    name: Push to ECR
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'payflow-eks-cluster' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set ECR registry and tag
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "ECR registry: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-gateway to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/api-gateway:${{ steps.ecr.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push auth-service to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/auth-service/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/auth-service:${{ steps.ecr.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push wallet-service to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/wallet-service/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/wallet-service:${{ steps.ecr.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/wallet-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push transaction-service to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/transaction-service/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/transaction-service:${{ steps.ecr.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/transaction-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push notification-service to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/notification-service/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/notification-service:${{ steps.ecr.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/frontend:${{ steps.ecr.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.EKS_CLUSTER_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ECR push summary
        run: |
          echo "## ECR push complete" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${{ steps.ecr.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Run \`IMAGE_TAG=${{ steps.ecr.outputs.tag }} ./deploy.sh\` from k8s/overlays/eks." >> $GITHUB_STEP_SUMMARY

  # Push to ACR when Azure credentials are set (for AKS deploy).
  # Add secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
  # Add vars: ACR_NAME (your registry name, e.g. payflowacr)
  push-acr:
    name: Push to ACR
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ vars.ACR_NAME != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Extract tag
        id: tag
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all services to ACR
        run: |
          TAG="${{ steps.tag.outputs.SHORT_SHA }}"
          ACR="${{ vars.ACR_NAME }}.azurecr.io/payflow"
          for svc in api-gateway auth-service wallet-service transaction-service notification-service frontend; do
            echo "Building $svc..."
            docker buildx build \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --tag "${ACR}/${svc}:${TAG}" \
              --tag "${ACR}/${svc}:latest" \
              --file "./services/${svc}/Dockerfile" \
              ./services
          done

      - name: ACR push summary
        run: |
          echo "## ACR push complete" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${{ steps.tag.outputs.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Run \`ACR_NAME=${{ vars.ACR_NAME }} IMAGE_TAG=${{ steps.tag.outputs.SHORT_SHA }} ./deploy.sh\` from k8s/overlays/aks." >> $GITHUB_STEP_SUMMARY
