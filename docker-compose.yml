version: '3.8'

# #### Docker Compose Configuration ####
# #### This file defines all services needed to run PayFlow locally ####

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================
  
  # #### PostgreSQL Database ####
  # #### This stores all persistent data (users, wallets, transactions) ####
  postgres:
    image: postgres:15-alpine  # Use PostgreSQL version 15 with Alpine Linux (smaller image)
    environment:
      POSTGRES_DB: payflow      # Database name
      POSTGRES_USER: payflow    # Database user
      POSTGRES_PASSWORD: payflow123  # Database password (use secrets in production!)
    ports:
      - "5432:5432"  # Expose PostgreSQL port to host
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist database data
      - ./migrations:/docker-entrypoint-initdb.d  # Run database migrations on startup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]  # Check if database is ready
      interval: 10s    # Check every 10 seconds
      timeout: 5s      # Wait 5 seconds for response
      retries: 5       # Try 5 times before marking as unhealthy
    restart: always
    networks:
      - payflow-network  # Connect to our custom network

  # #### Redis Cache ####
  # #### This stores temporary data (sessions, cache, rate limiting) ####
  redis:
    image: redis:7-alpine  # Use Redis version 7 with Alpine Linux
    ports:
      - "6379:6379"  # Expose Redis port to host
    volumes:
      - redis_data:/data  # Persist Redis data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  # Check if Redis is responding
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - payflow-network

  # #### RabbitMQ Message Queue ####
  # #### This handles asynchronous communication between services ####
  # #### Used for transaction processing and notifications ####
  rabbitmq:
    image: rabbitmq:3-management-alpine # #### RabbitMQ with management UI ####
    ports:
      - "5672:5672"   # #### AMQP port for message publishing ####
      - "15672:15672" # #### Management UI port ####
    environment:
      RABBITMQ_DEFAULT_USER: payflow     # #### RabbitMQ username ####
      RABBITMQ_DEFAULT_PASS: payflow123  # #### RabbitMQ password ####
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq  # #### Persist RabbitMQ data ####
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"] # #### Check if RabbitMQ is responding ####
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - payflow-network

  # ============================================
  # MONITORING STACK
  # Start with: docker compose --profile monitoring up
  # Access: Prometheus http://localhost:9090  Grafana http://localhost:3006 (admin/admin)
  #         Alertmanager http://localhost:9093
  # ============================================
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      # NOTE: prometheus.yml uses Kubernetes FQDNs (*.svc.cluster.local) — targets will show
      # as DOWN in Docker Compose, but Prometheus UI, alerts, and Grafana dashboards are accessible.
      - ./k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./k8s/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - payflow-network
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    ports:
      - "3006:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./k8s/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./k8s/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    networks:
      - payflow-network
    restart: unless-stopped

  alertmanager:
    profiles: ["monitoring"]
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./k8s/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - payflow-network
    restart: unless-stopped

  # ============================================
  # LOGGING STACK
  # Start with: docker compose --profile logging up
  # (or combine: docker compose --profile monitoring --profile logging up)
  # Access: Loki http://localhost:3100  (add as datasource in Grafana)
  # ============================================
  loki:
    profiles: ["logging"]
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - payflow-network
    restart: unless-stopped

  promtail:
    profiles: ["logging"]
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - ./services:/services:ro
      - ./k8s/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - payflow-network
    restart: unless-stopped

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  auth-service:
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payflow
      DB_USER: payflow
      DB_PASSWORD: payflow123
      REDIS_URL: redis://redis:6379
      JWT_SECRET: J8vmoWX/NIIcBunMHhkMmok7ZViKS/OaQovGmp9ETm2+puxFEL/lt+egqTNRLM3J
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
      SERVICE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  wallet-service:
    build:
      context: ./services
      dockerfile: wallet-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payflow
      DB_USER: payflow
      DB_PASSWORD: payflow123
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      CONTAINER_ENV: "true"
      SERVICE_NAME: wallet-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - payflow-network

  transaction-service:
    build:
      context: ./services
      dockerfile: transaction-service/Dockerfile
    ports:
      - "3005:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payflow
      DB_USER: payflow
      DB_PASSWORD: payflow123
      RABBITMQ_URL: amqp://payflow:payflow123@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      WALLET_SERVICE_URL: http://wallet-service:3001
      NODE_ENV: development
      CONTAINER_ENV: "true"
      SERVICE_NAME: transaction-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  notification-service:
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payflow
      DB_USER: payflow
      DB_PASSWORD: payflow123
      RABBITMQ_URL: amqp://payflow:payflow123@rabbitmq:5672
      NODE_ENV: development
      CONTAINER_ENV: "true"
      SERVICE_NAME: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      # Service URLs — Docker Compose DNS uses service names as hostnames
      AUTH_SERVICE_URL: http://auth-service:3004
      WALLET_SERVICE_URL: http://wallet-service:3001
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
      # Database — required for the health-check connection pool (server.js:74)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payflow
      DB_USER: payflow
      DB_PASSWORD: payflow123
      REDIS_URL: redis://redis:6379
      JWT_SECRET: J8vmoWX/NIIcBunMHhkMmok7ZViKS/OaQovGmp9ETm2+puxFEL/lt+egqTNRLM3J
      NODE_ENV: development
      SERVICE_NAME: api-gateway
      # Empty string → api-gateway reflects request Origin (required when credentials:true)
      # "*" wildcard is rejected by browsers for credentialed requests — do not use it.
      CORS_ORIGIN: ""
    depends_on:
      - auth-service
      - wallet-service
      - transaction-service
      - notification-service
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # FRONTEND
  # ============================================
  frontend:
    # REACT_APP_API_URL is a BUILD-TIME variable baked into the JS bundle.
    # Do NOT pass it here — the Dockerfile default (/api) produces the correct relative
    # URL that works in Docker Compose, MicroK8s, EKS, and AKS without rebuilding.
    # The same image built here can be pushed to any registry and deployed to K8s.
    build:
      context: ./services
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    environment:
      # nginx proxies /api/* → api-gateway at this URL (substituted at container start)
      API_GATEWAY_URL: http://api-gateway:3000
      # Docker's internal DNS resolver (127.0.0.11). K8s deployments use kube-dns instead.
      NGINX_RESOLVER: "127.0.0.11"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - payflow-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:

networks:
  payflow-network:
    driver: bridge
