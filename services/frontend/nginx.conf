# ============================================================
# NOTE: This file is NOT used by the container at runtime.
# The container uses nginx.conf.template processed by docker-entrypoint.sh.
# This file is kept as a static reference / local dev fallback only.
#
# Why variable proxy_pass + resolver?
#   nginx resolves all proxy_pass hostnames at startup by default.
#   If the upstream (api-gateway) isn't ready yet, nginx fails with
#   "host not found" and causes CrashLoopBackOff in Kubernetes.
#   Using a variable forces DNS resolution at REQUEST time, not startup.
#   The resolver directive tells nginx which DNS server to use.
#
# Per-environment resolver values (set NGINX_RESOLVER env var):
#   Docker Compose : 127.0.0.11  (Docker's built-in DNS)
#   MicroK8s / EKS / AKS : kube-dns.kube-system.svc.cluster.local
# ============================================================
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver is set via NGINX_RESOLVER env var in nginx.conf.template.
    # This static file uses the K8s value for reference.
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;
    resolver_timeout 5s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy /api/* to api-gateway.
    # Variable forces lazy DNS resolution (no CrashLoopBackOff on startup).
    # API_GATEWAY_URL is set via env var (docker-entrypoint.sh substitutes it).
    location /api {
        set $api_gateway "http://api-gateway.payflow.svc.cluster.local:80";
        proxy_pass $api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
