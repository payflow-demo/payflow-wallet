# =============================================================================
# Local GitOps: self-hosted runner → MicroK8s registry → Argo CD
# =============================================================================
# Runs on pushes to main/master. Requires a self-hosted runner with Docker.
# macOS + Multipass: publishes images via ctr import/push into microk8s-vm
# (Docker cannot push to localhost:32000 from the Mac host).
# Linux + MicroK8s on same host: uses docker push to localhost:32000 when
# microk8s-vm is not present.
#
# Setup: docs/cicd-local.md
# Secrets: GITOPS_PAT (optional) — PAT with repo contents write if GITHUB_TOKEN
#          cannot push to protected main.
# =============================================================================

name: Local GitOps (MicroK8s)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "k8s/overlays/local/kustomization.yaml"

concurrency:
  group: gitops-local-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (npm install)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: |
          set -e
          for dir in services/api-gateway services/auth-service services/wallet-service \
                     services/transaction-service services/notification-service; do
            echo "::group::$dir"
            (cd "$dir" && npm install --no-save)
            echo "::endgroup::"
          done

      - name: Install frontend deps
        run: cd services/frontend && npm install --no-save

  gitops:
    name: Build, registry publish, bump kustomize
    needs: validate
    runs-on: self-hosted
    permissions:
      contents: write

    env:
      REGISTRY_HOST: localhost:32000

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT || github.token }}
          fetch-depth: 0

      - name: Short SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Ensure kustomize (macOS)
        if: runner.os == 'macOS'
        run: command -v kustomize >/dev/null 2>&1 || brew install kustomize

      - name: Ensure kustomize (Linux)
        if: runner.os == 'Linux'
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            mkdir -p "${HOME}/.local/bin"
            KVER="v5.5.0"
            curl -sSLo /tmp/kustomize.tar.gz \
              "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KVER}/kustomize_${KVER}_linux_amd64.tar.gz"
            tar -xzf /tmp/kustomize.tar.gz -C "${HOME}/.local/bin" kustomize
            rm -f /tmp/kustomize.tar.gz
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi

      - name: Build and publish images
        run: |
          set -euo pipefail
          TAG="${{ steps.sha.outputs.SHORT_SHA }}"
          REGISTRY="${{ env.REGISTRY_HOST }}"
          SERVICES="api-gateway auth-service wallet-service transaction-service notification-service frontend"

          use_multipass=false
          if command -v multipass >/dev/null 2>&1 \
            && multipass list --format csv 2>/dev/null | grep -q "^microk8s-vm,"; then
            use_multipass=true
            echo "Using Multipass path (macOS MicroK8s) for registry publish"
          else
            echo "Using direct docker push to ${REGISTRY}"
          fi

          for svc in $SERVICES; do
            echo "::group::Build $svc"
            docker build --provenance=false \
              -t "${REGISTRY}/${svc}:${TAG}" \
              -t "${REGISTRY}/${svc}:latest" \
              -f "services/${svc}/Dockerfile" ./services
            echo "::endgroup::"

            if [ "$use_multipass" = true ]; then
              _TMPTAR="$(mktemp "/tmp/payflow-${svc}-XXXXXX.tar")"
              docker save "${REGISTRY}/${svc}:${TAG}" > "$_TMPTAR"
              multipass transfer "$_TMPTAR" "microk8s-vm:/tmp/${svc}-import.tar"
              rm -f "$_TMPTAR"
              multipass exec microk8s-vm -- sudo microk8s ctr image import "/tmp/${svc}-import.tar"
              multipass exec microk8s-vm -- rm -f "/tmp/${svc}-import.tar"
              multipass exec microk8s-vm -- sudo microk8s ctr image push --plain-http "${REGISTRY}/${svc}:${TAG}"
            else
              for i in 1 2 3 4 5 6; do
                if curl -sf "http://${REGISTRY}/v2/" >/dev/null 2>&1; then
                  break
                fi
                echo "Waiting for registry at ${REGISTRY} (attempt ${i}/6)..."
                sleep 10
              done
              curl -sf "http://${REGISTRY}/v2/" >/dev/null 2>&1 \
                || { echo "Registry not reachable at http://${REGISTRY}/v2/"; exit 1; }
              docker push "${REGISTRY}/${svc}:${TAG}"
              docker push "${REGISTRY}/${svc}:latest"
            fi
          done

      - name: Bump k8s/overlays/local kustomization
        working-directory: k8s/overlays/local
        run: |
          set -euo pipefail
          TAG="${{ steps.sha.outputs.SHORT_SHA }}"
          R="${{ env.REGISTRY_HOST }}"
          kustomize edit set image \
            "veeno/api-gateway=${R}/api-gateway:${TAG}" \
            "veeno/auth-service=${R}/auth-service:${TAG}" \
            "veeno/wallet-service=${R}/wallet-service:${TAG}" \
            "veeno/transaction-service=${R}/transaction-service:${TAG}" \
            "veeno/notification-service=${R}/notification-service:${TAG}" \
            "veeno/frontend=${R}/frontend:${TAG}"

      - name: Commit and push manifest bump
        env:
          TAG: ${{ steps.sha.outputs.SHORT_SHA }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/local/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No kustomization changes to commit."
            exit 0
          fi
          git commit -m "chore(gitops): bump local images to ${TAG} [skip ci]"
          git push

      - name: Summary
        run: |
          {
            echo "## Local GitOps"
            echo "Image tag: \`${{ steps.sha.outputs.SHORT_SHA }}\`"
            echo "Argo CD should sync \`k8s/overlays/local\` on the next poll (or via webhook)."
          } >> "$GITHUB_STEP_SUMMARY"
